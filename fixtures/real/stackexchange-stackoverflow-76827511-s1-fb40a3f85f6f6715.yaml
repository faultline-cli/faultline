title: How to install pipenv on Ubuntu 23 after PEP 668?
fixture_class: real
normalized_log: |-
    At least as of early 2025, the Official PipEnv Docs suggest installing through Pip.
    The suggested command is pip install --user pipenv . Which will lead to this error on newer versions of Ubuntu.
    As per said docs, the spirit of this installation method seems to be "It's easy to have conflicts when Python dependencies are installed system-wide. Don't do that to save headache." So while the mentioned apt install pipenv command might work, it seems to go against the spirit of Pipenv, by using a solution that installs system-wide.
    A better alternative is probably to install your Python virtual environment, load said virtual environment, and then at that point, you should be able to install Pipenv with pip install pipenv . This will install Pipenv only to that environment. So if you exit out of the virtual environment, delete it, etc, then you will not have access to Pipenv.
    Which seems to make sense anyways. You can't accidentally have the wrong environment loaded (or have the system python environment loaded) and then run pipenv and install packages to where you didn't intend. Instead, if you don't have the correct environment loaded, you simply won't have access to Pipenv.
