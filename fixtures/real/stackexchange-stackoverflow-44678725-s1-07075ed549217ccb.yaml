title: Cannot connect to the Docker daemon at unix:/var/run/docker.sock. Is the docker daemon running?
fixture_class: real
normalized_log: |-
    None of the other answers worked for me on CentOS. I fixed the Cannot connect to the Docker daemon error (despite the daemon running) with:
    systemctl restart docker.socket
    systemctl restart docker
    This recreates the missing /var/run/docker.sock file, which the client needs. Verified it worked with docker ps. Check the socket (ls -l /var/run/docker.sock) if issues persist
