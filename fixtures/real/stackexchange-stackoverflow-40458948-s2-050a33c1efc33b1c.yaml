title: Docker jenkins container, host key verification failed
fixture_class: real
normalized_log: |-
    Please make sure you have the correct access rights
    and the repository exists.
    Then I tried just ssh into the bitbucket server.
    + ssh git@mybitbucketserver.org
    Pseudo-terminal will not be allocated because stdin is not a terminal.
    Host key verification failed.
    I realized when I ssh via the -oStrictHostKeyChecking=no the host key is saved anyways but the ssh client returns with 255 because of sshd and the pipeline fails so I've put a || true at the end.
    Pseudo-terminal will not be allocated because stdin is not a terminal.
    Warning: Permanently added 'mybitbucketserver.org,10.5.132.51' (RSA) to the list of known hosts.
    shell request failed on channel 0
    + true
    After this the host key is 'verified' so git clone ssh:// works therefore ansible-galaxy too.
    ...
    stage('get ansible roles') {
    sh 'ssh -oStrictHostKeyChecking=no git@mybitbucketserver.org || true'
    sh 'ansible-galaxy install -r requirements.yaml -p roles/'
    ...
    }
    ...
    output:
