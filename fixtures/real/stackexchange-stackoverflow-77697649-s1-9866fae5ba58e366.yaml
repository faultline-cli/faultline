title: using CI_JOB_TOKEN for API call inside CI pipeline returns 404
fixture_class: real
normalized_log: |-
    You need to create personal access token or project access token. The problem is that you will need to re-create such tokens once per year (internal gitlab policy). Of course you will forget about that token and your script will loose ability to access gitlab api.
    Job token is created for each job automatically, but you can't access some api endpoints. And you can't force gitlab to add more privileges to this token.
    So you need to do rotation of your token and write it to the env variable using gitlab api:
    test_job:
    image: bash:latest
    stage: test
    script:
    - apk add curl jq
    - |
    curl --header "PRIVATE-TOKEN: ${CI_PROJECT_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/pipelines/${CI_PIPELINE_ID}/jobs"
expectation:
