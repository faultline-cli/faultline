normalized_log: |-
    (I know the fixed host port is deprecated and against the philosophy of the testcontainers authors, but I have not found a solution for that yet. I want to get rid of it but will leave that issue for another question.)
    If the container starts, the tests run as intended. But if it doesn't, 0 tests are run and the pipeline succeeds. I can run the tests locally, if the container starts normally the tests are executed, if the container fails to start it also lists 0 tests run and "build success". How do I let this fail so we will notice there is an issue with our setup? I'm not even sure in which of the moving parts I should be fixing the issue.
