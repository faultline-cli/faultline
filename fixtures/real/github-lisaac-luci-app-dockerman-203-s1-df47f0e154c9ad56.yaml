title: luci-app-dockerman cannot pull private Docker Hub images (authentication not forwarded)
fixture_class: real
normalized_log: |-
    **Describe the bug**
    When pulling a private Docker Hub image via LuCI (luci-app-dockerman) web interface, the pull fails with `404 / unauthorized: authentication required`, even though the same image can be successfully pulled via `docker pull` over SSH after `docker login`.
    It seems that luci-app-dockerman does not pass registry authentication credentials (X-Registry-Auth) to the Docker daemon API when performing image pulls, so private repositories cannot be accessed from the web UI.
