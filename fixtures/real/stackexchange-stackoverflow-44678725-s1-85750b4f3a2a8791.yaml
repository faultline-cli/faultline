id: stackexchange-stackoverflow-44678725-s1-85750b4f3a2a8791
title: Cannot connect to the Docker daemon at unix:/var/run/docker.sock. Is the docker daemon running?
fixture_class: real
normalized_log: |-
    On Ubuntu 20.04 and Docker version 20.10.11,as a non root user, Running:
    sudo service docker start
    Then checking the status
    sudo service docker status
    Shows
    * Docker is running
    But trying any docker command such as
    docker images
    Shows the same error
    Cannot connect to the Docker daemon at unix:///var/run/docker.sock. Is the docker daemon running?
    Running the below solves it
    sudo service docker restart
    Restart solved it, while start did not
