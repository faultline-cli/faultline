title: SQLSTATE [HY000] [2002] Connection refused in PHP Apache Docker container using mariadb, if connected via Dockerfile&#39;s CMD (PHP CLI works)
fixture_class: real
normalized_log: |-
    volumes:
    maria-db-storage:
    I tried localhost and 127.0.0.1 as the value of the environment variable MARIADB_HOST . It does not solve the problem.
    The following php code (content of src/init.php ):
    new PDO(
    "mysql:host={$_ENV['MARIADB_HOST']};dbname={$_ENV['MARIADB_DB']}",
    $_ENV['MARIADB_USER'],
    $_ENV['MARIADB_PASSWORD'],
    [
    PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION,
    PDO::ATTR_DEFAULT_FETCH_MODE => PDO::FETCH_ASSOC
    ]
    );
    Always results in:
    SQLSTATE[HY000] [2002] Connection refused .
    UPDATE
    I came a step further by replacing this line here:
    MARIADB_HOST: "127.0.0.1"
    with the name of my database service; being:
    MARIADB_HOST: db
    I found out at the same time that I can only login to the adminer dashboard if I use db as the host. This was a guess, and I would love to understand why this works?
    This however still does not fully work yet. It only works if I omit the CMD line in the dockerfile, build the container, migrate into its terminal via docker exec -t -i php-apache /bin/bash , and run the command php src/init.php from within there. If I try to do so via CMD from the Dockerfile (as detailed above), I get the mentioned error.
    What am I still missing?
    I would of course prefer to automate this init call with the running start of the Docker container. Digging further...
