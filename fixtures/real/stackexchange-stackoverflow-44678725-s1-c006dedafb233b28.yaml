    docker run -p 8050:8050 scrapinghub/splash
    sudo docker run -p 8050:8050 scrapinghub/splash
    sudo usermod -aG docker $(whoami)
    sudo docker run -p 8050:8050 scrapinghub/splash
    newgrp docker
    sudo docker run -p 8050:8050 scrapinghub/splash
