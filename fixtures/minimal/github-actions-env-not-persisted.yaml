id: github-actions-env-not-persisted-canonical
title: GitHub Actions set-env command disabled — env var not persisted
fixture_class: minimal
normalized_log: |
  Run Set build version
    echo "::set-env name=APP_VERSION::$(git describe --tags --always)"
    shell: /usr/bin/bash -e {0}
  Warning: The `set-env` command is deprecated and will be disabled soon. Please upgrade to using Environment Files. For more information see: https://github.blog/changelog/2020-10-01-github-actions-deprecating-set-env-and-add-path-commands/

  Run Build Docker image
    docker build -t myapp:$APP_VERSION .
    shell: /usr/bin/bash -e {0}
  Error: Unable to process command '::set-env' successfully. The `set-env` command is disabled. Please upgrade to using Environment Files. See https://docs.github.com/actions/using-workflows/workflow-commands-for-github-actions
  Error: Process completed with exit code 1.
expectation:
  expected_playbook: github-actions-env-not-persisted
