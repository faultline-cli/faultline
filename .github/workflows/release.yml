name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to stamp into binaries"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event.inputs.version || github.ref_name }}
      PREMIUM_PACK_REPO_TOKEN: ${{ secrets.PREMIUM_PACK_REPO_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out premium pack repository
        if: vars.PREMIUM_PACK_REPO != '' && env.PREMIUM_PACK_REPO_TOKEN != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.PREMIUM_PACK_REPO }}
          token: ${{ env.PREMIUM_PACK_REPO_TOKEN }}
          path: faultline-premium

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: make test

      - name: Review bundled playbook conflicts
        run: make review

      - name: Check real fixture corpus baseline
        run: make fixture-check

      - name: Compose starter with premium pack
        if: vars.PREMIUM_PACK_REPO != '' && env.PREMIUM_PACK_REPO_TOKEN != ''
        run: make extra-pack-check EXTRA_PACK_DIR=faultline-premium

      - name: Build release archives
        run: make release-snapshot VERSION="$VERSION"

      - name: Smoke test release archive
        run: make smoke-release VERSION="$VERSION"

      - name: Smoke test Docker image
        run: make docker-smoke IMAGE=faultline-release-smoke

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: faultline-${{ env.VERSION }}
          path: dist/releases/${{ env.VERSION }}/*.tar.gz

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/releases/${{ env.VERSION }}/*.tar.gz
