id: github-actions-syntax
title: GitHub Actions workflow YAML syntax error
category: ci
severity: high
base_score: 1.0
tags: [github-actions, yaml, syntax, workflow, ci]
stage_hints: [build]

match:
  any:
    - "Invalid workflow file"
    - "You have an error in your yaml syntax"
    - "yaml: line"
    - "did not find expected key"
    - "mapping values are not allowed here"
    - "could not parse the workflow file"
    - "error reading"
    - "Unrecognized named-value"
    - "Unexpected value"
    - "yaml: unmarshal errors"
    - "The workflow is not valid"

explain: >
  The GitHub Actions workflow YAML file contains a syntax error. GitHub
  rejected the workflow before any job could run.

why: >
  Workflow YAML files must follow strict GitHub Actions schema rules. Common
  causes include incorrect indentation, unquoted expressions containing colons,
  invalid `on:` trigger syntax, missing required fields, or extra whitespace
  characters.

fix:
  - "Validate the workflow locally: `pip install yamllint && yamllint .github/workflows/*.yml`."
  - "Use the GitHub Actions VS Code extension which provides schema validation in the editor."
  - "Check the exact line number from the error message and inspect indentation carefully."
  - "Ensure expressions like `${{ secrets.TOKEN }}` are quoted when they appear in string values."
  - "Verify `on:` trigger syntax using the GitHub Actions documentation."

prevent:
  - Install a YAML linter into your editor and CI pre-flight.
  - "Use `actionlint` in CI: `actionlint .github/workflows/*.yml`."
  - Use GitHub's built-in workflow editor which validates syntax on save.

workflow:
  likely_files:
    - .github/workflows/
  local_repro:
    - "yamllint .github/workflows/"
    - "actionlint"
