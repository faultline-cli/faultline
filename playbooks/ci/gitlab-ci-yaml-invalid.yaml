id: gitlab-ci-yaml-invalid
title: GitLab CI pipeline configuration invalid
category: ci
severity: high
base_score: 1.0
tags: [gitlab, gitlab-ci, yaml, lint, pipeline, ci]
stage_hints: [build]

match:
  any:
    - "ERROR: Config file is not valid"
    - "ERROR: Job is invalid"
    - ".gitlab-ci.yml"
    - "config validation error"
    - "jobs:.*config contains unknown keys"
    - "Included file"
    - "error validating"
    - "did you mean"
    - "needs.*not defined"
    - "keyword.*invalid"
    - "script should be a list or a"
    - "stage does not exist"

explain: >
  The `.gitlab-ci.yml` configuration failed GitLab's built-in YAML and
  schema validation. No pipeline was started.

why: >
  GitLab CI validates pipeline configurations against its own schema before
  execution. Common causes include invalid YAML indentation, using unknown
  or renamed job keywords, referencing a stage not declared in the `stages`
  list, a `needs:` entry pointing to a job that doesn't exist, or an included
  file that cannot be resolved.

fix:
  - "Run the GitLab CI Lint API to get a detailed error: visit `<gitlab-url>/-/ci/lint` and paste your config."
  - "Use the GitLab CLI: `glab ci lint .gitlab-ci.yml` for local validation."
  - "Validate the YAML structure first: `yamllint .gitlab-ci.yml`."
  - "Check the exact line in the error — `needs:` jobs must exist in the same or a prior stage."
  - "Ensure every stage referenced by a job is declared in the top-level `stages:` list."
  - "For `include:` directives, verify the referenced file path, project, or URL is accessible to the runner."

prevent:
  - Add `glab ci lint` or the GitLab API lint endpoint as a pre-commit hook or merge request pipeline step.
  - Use the GitLab Web IDE which provides live `.gitlab-ci.yml` validation in the editor.
  - Use YAML anchors (`&anchor`, `*alias`, `<<: *merge`) carefully — GitLab supports them but errors can be subtle.
  - Validate included external files with their own lint job to catch cross-file dependency errors.

workflow:
  likely_files:
    - .gitlab-ci.yml
    - .gitlab/
