id: azure-pipeline-task-failure
title: Azure Pipelines task failure or misconfiguration
category: ci
severity: high
base_score: 1.0
tags: [azure-devops, azure-pipelines, task, yaml, ci, devops, service-connection]
stage_hints: [build, deploy, test]

match:
  any:
    - "##[error]"
    - "Task failed."
    - "VSTS task"
    - "AzureCLI task"
    - "##vso[task.logissue"
    - "azure-pipelines"
    - "AzureDevOps"
    - "No hosted parallelism has been purchased"
    - "##[warning]Agent"
    - "System.Exception: Input required: "
    - "Task.*failed"
    - "Error: Task is not authorized"
    - "ServiceConnectionNotFound"
    - "ConnectedServiceNotFound"
    - "ResourceNotFound.*pool"
    - "Agent pool.*not found"
    - "Could not find a pool with name"

explain: >
  An Azure Pipelines task failed, the pipeline YAML is invalid, or a
  required service connection or agent pool is unavailable.

why: >
  Azure Pipelines task failures are caused by: invalid task version or input
  names that changed between major task versions, a missing or unauthorized
  service connection, the specified agent pool not existing or having no
  available agents, missing pipeline variables, or YAML schema violations in
  `azure-pipelines.yml`.

fix:
  - "Search the log for `##[error]` lines to locate the precise failure message."
  - "For a missing service connection: go to Project Settings > Service Connections and verify the connection exists and this pipeline has access."
  - "For a missing agent pool: confirm the pool name in the YAML matches an active pool under Organization Settings > Agent Pools."
  - "For task version issues: pin the major version (e.g., `- task: NodeTool@0`) and verify input names match the pinned version's spec."
  - "For 'No hosted parallelism': check parallel job quota under Organization Settings > Billing, or request a free grant."
  - "For `Input required`: add the missing variable to the pipeline definition or link the variable group that contains it."
  - "Re-authorize expired service connections: Project Settings > Service Connections > Edit > Verify."

prevent:
  - Install the Azure Pipelines VS Code extension for local YAML IntelliSense and schema validation.
  - Pin task versions explicitly (`TaskName@majorVersion`) to prevent silent breakage when tasks receive major updates.
  - Use variable groups to centralize secrets and reduce per-pipeline configuration drift.
  - Document all required service connections and agent pools in the repository so new environments can be provisioned correctly.

workflow:
  likely_files:
    - azure-pipelines.yml
    - .azure/pipelines/

