id: helm-upgrade-failed
title: Helm upgrade failed and rollback triggered
category: deploy
severity: high
base_score: 1.0
tags: [helm, kubernetes, upgrade, rollback, deploy]
stage_hints: [deploy]

match:
  any:
    - "UPGRADE FAILED"
    - "Helm upgrade failed"
    - "helm upgrade.*failed"
    - "Rollback was triggered following"
    - "release.*failed.*reverted"
    - "Error: UPGRADE FAILED"
    - "has been rolled back"
    - "timed out waiting for the condition"
    - "release.*failed.*to deploy"
    - "FAILED: deploy timed out"

explain: >
  A Helm upgrade failed and the release was automatically rolled back to the
  previous revision. The new version of the application was not successfully
  deployed.

why: >
  Helm upgrades fail when: pods fail liveness or readiness checks, required
  resources (Secrets, PVCs) are missing, a Kubernetes API version is
  incompatible with the chart, or the upgrade timeout is too short for the
  deployment to complete.

fix:
  - "Check the Helm release history: `helm history <release> -n <namespace>`."
  - "Get the failure reason: `helm get manifest <release> -n <namespace>` and `kubectl describe pod -l app=<name>`."
  - "View the pod logs from the failed revision: `kubectl logs <pod> --previous`."
  - "If a readiness probe timed out, increase `--timeout` on the upgrade command or tune the probe intervals."
  - "If the chart uses deprecated API versions, run `helm template | kubectl convert -f -` to identify them."

prevent:
  - Use `--atomic` on `helm upgrade` to auto-rollback and surface failures clearly.
  - Add a `helm diff upgrade` dry-run step to preview changes before applying.
  - Run Helm chart tests (`helm test`) after each upgrade in the pipeline.

workflow:
  likely_files:
    - helm/
    - "Chart.yaml"
    - "values.yaml"
  local_repro:
    - helm history <release> -n <namespace>
    - kubectl describe pod -n <namespace>
