id: missing-idempotency-guard
title: Mutating handler missing idempotency guard
category: runtime
severity: high
detector: source
base_score: 1.0
tags: [source, idempotency, handlers, payments]

source:
  triggers:
    - id: mutation_handler
      label: mutating handler
      patterns:
        - "router.Post("
        - "http.HandleFunc("
        - "createCharge("
        - "chargeCustomer("
      weight: 1.2
  amplifiers:
    - id: direct_side_effect
      label: direct side effect
      patterns:
        - "store.Save("
        - "gateway.Charge("
        - "publishEvent("
      weight: 1.1
  mitigations:
    - id: idempotency
      label: idempotency guard
      patterns:
        - "Idempotency-Key"
        - "ensureIdempotency("
        - "RequireIdempotency("
      weight: 1.4
    - id: feature_flag
      label: feature flag
      patterns:
        - "featureflag.Enabled("
      weight: 0.8
  local_consistency:
    - id: local_idempotency_idiom
      label: violates local idempotency idiom
      scope: module
      minimum_peers: 2
      threshold: 0.6
      amplifier: 1.5
  change_sensitivity:
    new_file_bonus: 1.0
    modified_line_bonus: 0.8
    legacy_discount: 0.4
  safe_context:
    - id: tests_are_safer
      label: test-only path
      paths: [tests/, test/, _test.go]
      discount: 1.6

scoring:
  blast_radius_bonus: 1.3
  hot_path_bonus: 1.0

explain: >
  A mutating request path performs a direct side effect without the idempotency
  guard that nearby handlers in the module already use.

why: >
  Local inconsistency is a strong signal here: when most peer handlers use the
  standard guard and one mutating path bypasses it, that path is higher risk
  even if the baseline trigger is otherwise common.

fix:
  - Require the standard idempotency guard before executing the side effect.
  - Reuse the module's existing wrapper rather than bypassing it.

prevent:
  - Keep write endpoints on a shared abstraction that enforces idempotency.
