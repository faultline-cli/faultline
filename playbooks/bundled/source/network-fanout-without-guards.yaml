id: network-fanout-without-guards
title: Outbound network fan-out without resilience guards
category: network
severity: high
detector: source
base_score: 1.2
tags: [source, network, timeout, retry, fanout, concurrency]

source:
  triggers:
    - id: outbound_call
      label: outbound network call
      patterns:
        - "http.NewRequest("
        - "http.Get("
        - "client.Do("
        - "fetch("
      weight: 1.4
    - id: loop
      label: fan-out loop
      patterns:
        - "for _, "
        - "for ("
        - "range items"
      weight: 1.2
  amplifiers:
    - id: missing_timeout
      label: missing timeout
      patterns:
        - "http.DefaultClient"
        - "&http.Client{"
      weight: 1.0
    - id: missing_retry
      label: missing retry/backoff
      patterns:
        - "err := client.Do("
        - "resp, err := client.Do("
      weight: 0.8
    - id: unbounded_go
      label: unbounded concurrency
      patterns:
        - "go func("
      weight: 1.1
  mitigations:
    - id: timeout
      label: timeout present
      patterns:
        - "Timeout:"
        - "context.WithTimeout("
      weight: 1.3
    - id: retry
      label: retry/backoff present
      patterns:
        - "retry.Do("
        - "backoff.Retry("
      weight: 1.0
    - id: bounded_concurrency
      label: bounded concurrency
      patterns:
        - "semaphore.NewWeighted("
        - "make(chan struct{}"
      weight: 1.1
  suppressions:
    - style: path
      paths:
        - internal/tools/
      reason: internal tooling accepted for now
      discount: 1.5
    - style: path
      paths:
        - examples/
      suppress_all: true
      reason: example code is non-production
  compound_signals:
    - id: fragile_fanout
      label: fragile fan-out in same function
      require: [outbound_call, loop, missing_timeout, missing_retry]
      scope: function
      bonus: 2.8
  local_consistency:
    - id: local_timeout_idiom
      label: violates local timeout idiom
      scope: module
      minimum_peers: 2
      threshold: 0.6
      amplifier: 1.1
  change_sensitivity:
    new_file_bonus: 1.5
    modified_line_bonus: 1.0
    legacy_discount: 0.5
  safe_context:
    - id: tests_are_safer
      label: test-only path
      paths: [tests/, test/, _test.go]
      discount: 1.8
    - id: migration_path
      label: migration path
      paths: [migrations/]
      discount: 1.2

scoring:
  blast_radius_bonus: 1.5
  hot_path_bonus: 1.0
  safe_context_discount: 1.0
  default_suppression_discount: 2.0

explain: >
  The code fans out outbound network traffic without nearby safety controls,
  which raises the risk of cascading timeouts, retries storms, or runaway
  concurrency in production paths.

why: >
  Compound risk is materially higher when an outbound call appears inside a
  loop or fan-out construct and there is no local timeout, retry/backoff, or
  concurrency bound close enough to plausibly apply.

fix:
  - Add a request timeout or context deadline in the same function as the outbound call.
  - Use bounded concurrency or a worker pool before fanning out requests.
  - Add retry/backoff only where the operation is safe to retry.

prevent:
  - Standardize outbound calls behind a shared client wrapper with timeouts and retries.
  - Keep resilience safeguards structurally close to the risky call site.
