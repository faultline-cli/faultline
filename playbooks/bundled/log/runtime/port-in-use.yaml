id: port-in-use
title: Port already in use
category: runtime
severity: medium
base_score: 1.0
tags: [port, network, bind, socket]
stage_hints: [build, test, deploy]
domain: runtime
class: port-in-use
mode: port-already-bound
summary: |-
  A process attempted to bind to a TCP or UDP port that is already occupied by another process on the same CI runner.
diagnosis: |-
  ## Diagnosis

  A process attempted to bind to a TCP or UDP port that is already occupied by another process on the same CI runner.
fix: |-
  ## Fix steps

  1. Identify what is holding the port:

     ```bash
     lsof -i :<port>
     ss -tlnp | grep :<port>
     ```

  2. Kill the occupying process:

     ```bash
     fuser -k <port>/tcp
     # or:
     lsof -ti :<port> | xargs kill -9
     ```

  3. On shared or persistent CI runners, previous jobs may leave lingering
     processes. Add a cleanup step at the start of the job to free known ports
     before starting services.
  4. Parameterise the port with an environment variable so parallel CI jobs
     can bind to different ports without conflict.
  5. Prefer ephemeral port 0 where supported: let the OS assign a free port
     and retrieve the assigned value from the listening socket handle.
validation: |-
  ## Validation

  - `lsof -i :<port>` — confirm the port is free before starting the service.
  - Re-run the failing step and confirm it binds without `EADDRINUSE`.
match:
  any:
    - address already in use
    - "bind: address already in use"
    - listen tcp
    - "EADDRINUSE"
  none:
    - port conflict
    - cannot start service
    - port is already allocated
    - race detected
    - database locked
    - test is not parallelizable
why_it_matters: |-
  ## Why it matters

  Shared or persistent CI runners retain processes from previous jobs. When a new job tries to bind the same port (e.g., 8080, 3000) that a lingering process is still listening on, the bind call fails immediately.

  ## Prevention

  - Use ephemeral ports in tests rather than fixed well-known ports.
  - Add a cleanup step at the end of each CI job to stop background services.
  - Use isolated container-per-job CI runners to avoid cross-job process leakage.
workflow:
  likely_files:
    - docker-compose.yml
    - .github/workflows/*.yml
    - .github/workflows/*.yaml
    - .env.example
  local_repro:
    - lsof -i :<port>
  verify:
    - lsof -i :<port>
