id: resource-limits
title: Resource limit exceeded
category: runtime
severity: high
base_score: 0.5
tags: [ulimit, cpu, file-descriptors, threads]
stage_hints: [build, test]

match:
  any:
    - too many open files
    - ulimit
    - resource temporarily unavailable
    - max open files
    - file descriptor limit
    - cannot create thread
    - "EMFILE"
    - "ENFILE"
    - system limit

explain: >
  The process exceeded an OS-enforced resource limit such as the maximum number
  of open file descriptors, threads, or processes.

why: >
  CI environments apply ulimits to prevent runaway processes from consuming all
  system resources. Tests or build tools that create many file handles, threads,
  or subprocesses without cleaning them up can hit these limits.

fix:
  - "Increase the relevant ulimit in the CI runner configuration: `ulimit -n 65536`."
  - Find and fix the resource leak (file handles not closed, threads not joined).
  - Reduce parallelism to lower peak resource consumption.

prevent:
  - "Use resource leak detectors such as `-race` in Go or sanitisers in C/C++."
  - Always close files, sockets, and database connections in defer/finally blocks.
  - Profile resource usage over long test runs to catch slow leaks.
