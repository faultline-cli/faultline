id: database-connection-pool-exhausted
title: Database connection pool exhausted
category: runtime
severity: high
base_score: 1.0
tags: [database, postgres, mysql, connection-pool, exhausted, pgbouncer, test]
stage_hints: [test, deploy]
summary: |-
  The application's database connection pool is full. New requests cannot acquire a connection before the pool timeout expires, causing queries to fail. This is distinct from the database being unreachable — the server is up but the pool is saturated.
diagnosis_markdown: |-
  ## Diagnosis

  The application's database connection pool is full. New requests cannot acquire a connection before the pool timeout expires, causing queries to fail. This is distinct from the database being unreachable — the server is up but the pool is saturated.
fix_markdown: |-
  ## Fix steps

  1. Check the current pool configuration: `pool_size`, `max_connections`, or `pool.max` in your ORM or database driver settings.
  2. For PostgreSQL: query the server to see active connections: `SELECT count(*), state FROM pg_stat_activity GROUP BY state;`
  3. Reduce connection count: lower test parallelism (`--workers=2`) or reduce the ORM pool size to fit within the database's `max_connections` limit.
  4. Look for connection leaks: calls to `db.query()` / `pool.connect()` without a corresponding `release()`, `close()`, or equivalent in all error paths.
  5. For CI test parallelism: each worker process acquires its own pool — multiply `pool_size × num_workers` and ensure it is below `max_connections` on the test database.
  6. For PgBouncer / connection poolers: verify the pool mode is set correctly (`transaction` mode reduces held connections; `session` mode holds them for the life of the request).
  7. Add a connection pool health check at application startup that validates the pool can acquire a connection before accepting traffic.
validation_markdown: |-
  ## Validation

  - psql -c "SELECT count(*), state FROM pg_stat_activity GROUP BY state;"
  - npm test -- --workers=2
match:
  any:
    - "connection pool exhausted"
    - "too many clients already"
    - "remaining connection slots"
    - "pool timeout"
    - "connect ECONNREFUSED.*5432"
    - "AcquireTimeout"
    - "QueueTimeout"
    - "pool is full"
    - "Error: timeout acquiring"
    - "FATAL:  remaining connection slots are reserved"
    - "no more connections allowed"
    - "Connection pool error"
    - "connection refused.*postgres"
    - "max_connections"
    - "PoolError"
    - "acquire timeout"
  none:
    - "could not translate host name"
    - "ENETUNREACH"
    - "could not connect to server: Connection refused"
workflow:
  likely_files:
    - "db/"
    - "src/database*"
    - "config/database*"
    - ".env.test"
    - "docker-compose.yml"
  local_repro:
    - "psql -c \"SELECT count(*), state FROM pg_stat_activity GROUP BY state;\""
    - "npm test -- --workers=2"
why_it_matters_markdown: |-
  ## Why it matters

  Connection pool exhaustion is one of the most common causes of test flakiness and staging instability. Each test worker or application instance holds a pool of persistent connections. When parallelism is high or pool sizes are misconfigured, the total held connections exceed the database server's `max_connections` limit, causing new acquires to queue and eventually time out. This can cascade to health check failures and deployment rollbacks.

  ## Prevention

  - Calculate maximum connection usage: `num_workers × pool_size` must be less than `max_connections` on the test database.
  - Add a `pool_timeout` alert so that timeouts surface as errors immediately rather than long hangs.
  - Run `SELECT * FROM pg_stat_activity WHERE state = 'idle';` in CI teardown to detect connection leaks per run.
  - Use PgBouncer in CI to multiplex connections and absorb per-worker pool volatility.
