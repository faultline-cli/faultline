id: disk-full
title: Disk space exhausted
category: runtime
severity: critical
base_score: 1.0
tags: [disk, storage, no space]
stage_hints: [build, deploy]
summary: |-
  The CI runner ran out of disk space. Writes to the filesystem fail immediately when the disk is full, typically causing builds, artifact generation, or log writes to abort.
diagnosis_markdown: |-
  ## Diagnosis

  The CI runner ran out of disk space. Writes to the filesystem fail immediately when the disk is full, typically causing builds, artifact generation, or log writes to abort.
fix_markdown: |-
  ## Fix steps

  1. Check how much space remains and which paths are largest:

     ```bash
     df -h
     du -sh /* 2>/dev/null | sort -rh | head -20
     ```

  2. Prune Docker images, containers, and build cache in one pass:

     ```bash
     docker system prune -af --volumes
     docker system df  # confirm how much was recovered
     ```

  3. Remove large intermediate build artifacts: `make clean`, `gradle clean`,
     `cargo clean`, or the project equivalent.
  4. Clear accumulated language-specific caches:

     ```bash
     rm -rf ~/.npm ~/.gradle/caches ~/.m2/repository ~/.cache/pip
     ```

  5. Add a disk space guard at the start of large jobs so failures are explicit
     rather than silent mid-step:

     ```bash
     AVAIL_KB=$(df --output=avail / | tail -1)
     [ "$AVAIL_KB" -lt 2097152 ] && echo "ERROR: less than 2 GB free" && exit 1
     ```

  6. If cleanup is not enough, increase the runner disk size or split build and
     test stages into separate smaller jobs with lighter footprints.
validation_markdown: |-
  ## Validation

  - `df -h` — confirm at least 1–2 GB is available before re-running.
  - Re-run the failing step and confirm it completes without an ENOSPC error.
match:
  any:
    - disk full
    - file system is full
    - no space remaining
    - not enough space
  none:
    - disk quota exceeded
    - "Write failed: No space left"
    - "ENOSPC"
    - no space left on device
why_it_matters_markdown: |-
  ## Why it matters

  Large Docker images, build artifacts, or log files can fill a runner's disk before the job completes. Caches that are never invalidated also accumulate over time on persistent runners.

  ## Prevention

  - Add a pre-build step that prunes old Docker images and containers.
  - Configure log rotation and limit artifact retention periods.
  - Monitor disk usage on persistent runners and alert before it reaches capacity.
