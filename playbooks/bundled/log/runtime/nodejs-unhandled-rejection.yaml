id: nodejs-unhandled-rejection
title: Node.js unhandled promise rejection
category: runtime
severity: high
base_score: 1.0
tags: [node, javascript, typescript, promise, async, unhandled-rejection]
stage_hints: [build, test, deploy]
summary: |-
  A Node.js process emitted an `UnhandledPromiseRejection` event — a Promise was rejected and no `.catch()` handler or `try/catch` around `await` was present to handle the error. In Node.js 15+ this terminates the process; in older versions it emits a warning.
diagnosis_markdown: |-
  ## Diagnosis

  A Node.js process emitted an `UnhandledPromiseRejection` event — a Promise was rejected and no `.catch()` handler or `try/catch` around `await` was present to handle the error. In Node.js 15+ this terminates the process; in older versions it emits a warning.
fix_markdown: |-
  ## Fix steps

  1. Read the rejection reason from the error message — it appears after `UnhandledPromiseRejectionWarning:` or `UnhandledPromiseRejection:`.
  2. Locate the rejected Promise in the stack trace; the origin is logged as `PromiseRejectionHandledWarning` in older Node versions.
  3. Wrap the `async` call or `.then()` chain in a `try/catch` block: `try { await riskyOperation(); } catch (err) { /* handle */ }`.
  4. For event-based flows: add `.catch(err => ...)` to all Promise chains that are not explicitly awaited.
  5. Search the codebase for `async` functions called without `await` or `.catch()` — these are latent rejection sources: `grep -rn 'async.*function\|=>.*{' src/ | grep -v await`.
  6. Add a global safety net during development: `process.on('unhandledRejection', (reason) => { console.error(reason); process.exit(1); })` — this makes silent rejections visible immediately.
  7. Enable `--unhandled-rejections=throw` (default in Node 15+) in CI to ensure all unhandled rejections fail the process.
validation_markdown: |-
  ## Validation

  - node --unhandled-rejections=throw <script>
  - npm test
match:
  any:
    - "UnhandledPromiseRejectionWarning"
    - "UnhandledPromiseRejection"
    - "unhandledRejection"
    - "PromiseRejectionHandledWarning"
    - "This error originated either by throwing inside"
    - "A promise was created in a handler"
    - "Unhandled promise rejection"
    - "process.on.*unhandledRejection"
    - "RejectionHandledWarning"
    - "ERR_UNHANDLED_REJECTION"
  none:
    - "jest"
    - "mocha"
    - "Jest worker"
workflow:
  likely_files:
    - "**/*.js"
    - "**/*.ts"
    - "src/"
  local_repro:
    - "node --unhandled-rejections=throw <script>"
    - "npm test"
why_it_matters_markdown: |-
  ## Why it matters

  In Node.js 15 and later, an unhandled Promise rejection terminates the process immediately with a non-zero exit code. In earlier versions, it emits a warning but continues running — silently swallowing errors. This means code that "works" on older Node can start crashing on upgrade without any source changes. Common sources: fire-and-forget async calls in route handlers, event emitter callbacks with async code, and database or network calls where `.catch()` was omitted.

  ## Prevention

  - Enforce `no-floating-promises` in ESLint or `@typescript-eslint` configuration to catch missing `await` at lint time.
  - Use `--unhandled-rejections=throw` in all CI Node.js invocations.
  - Review code changes that introduce `async` functions for proper error boundary coverage.
