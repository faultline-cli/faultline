id: container-entrypoint-missing
title: Container entrypoint not found or exec format error
category: runtime
severity: high
base_score: 1.0
tags: [container, entrypoint, docker, exec, binary, architecture]
stage_hints: [deploy]

match:
  any:
    - "exec format error"
    - "no such file or directory.*entrypoint"
    - "container has runnable image.*but no viable entrypoint"
    - "executable file not found in $PATH"
    - "OCI runtime exec failed"
    - "starting container process caused"
    - "not found.*entrypoint"
    - "cannot execute: required file not found"
    - "standard_init_linux.go"

explain: >
  The container cannot start because the entrypoint binary is missing, not
  executable, or was compiled for a different CPU architecture.

why: >
  This error occurs when: the binary was compiled for the wrong platform
  (e.g., `linux/amd64` image runs on an `arm64` host), the entrypoint path in
  `CMD`/`ENTRYPOINT` is wrong, the binary is missing from the final image stage
  (common in multi-stage builds where a `COPY --from` is forgotten), or the
  shebang line in a script references an interpreter that is not installed.

fix:
  - "Run the container interactively to inspect the filesystem: `docker run --entrypoint sh <image>`."
  - "Verify the binary exists and is executable inside the image: `docker run <image> ls -la /app/server`."
  - "For architecture mismatches, build the image for the correct platform: `docker buildx build --platform linux/amd64 .`."
  - "In multi-stage Dockerfiles, ensure the final `COPY --from=builder` includes all required binaries."
  - "Check the shebang line in shell scripts and ensure the interpreter (e.g., `/bin/sh`) exists in the base image."

prevent:
  - Add a smoke-test step that runs `docker run <image> /bin/true` before pushing to a registry.
  - Specify `--platform` in `docker build` to match the deployment target explicitly.
  - Validate multi-stage Dockerfiles by listing the final image contents in CI.

workflow:
  likely_files:
    - Dockerfile
  local_repro:
    - docker run --entrypoint sh <image> -c 'ls -la /app/'
    - docker inspect <image> --format '{{.Config.Entrypoint}}'
