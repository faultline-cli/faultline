id: github-actions-syntax
title: GitHub Actions workflow YAML syntax error
category: ci
severity: high
base_score: 1.0
tags: [github-actions, yaml, syntax, workflow, ci]
stage_hints: [build]
summary: |-
  The GitHub Actions workflow YAML file contains a syntax error. GitHub rejected the workflow before any job could run.
diagnosis_markdown: |-
  ## Diagnosis

  The GitHub Actions workflow YAML file contains a syntax error. GitHub rejected the workflow before any job could run.
fix_markdown: |-
  ## Fix steps

  1. Validate the workflow locally: `pip install yamllint && yamllint .github/workflows/*.yml`.
  2. Use the GitHub Actions VS Code extension which provides schema validation in the editor.
  3. Check the exact line number from the error message and inspect indentation carefully.
  4. Ensure expressions like `${{ secrets.TOKEN }}` are quoted when they appear in string values.
  5. Verify `on:` trigger syntax using the GitHub Actions documentation.
validation_markdown: |-
  ## Validation

  - Re-run the local reproduction command after the fix.
  - yamllint .github/workflows/
  - actionlint
match:
  any:
    - "Invalid workflow file"
    - "You have an error in your yaml syntax"
    - "yaml: line"
    - "did not find expected key"
    - "mapping values are not allowed here"
    - "could not parse the workflow file"
    - "error reading"
    - "Unrecognized named-value"
    - "Unexpected value"
    - "yaml: unmarshal errors"
    - "The workflow is not valid"
workflow:
  likely_files:
    - .github/workflows/
  local_repro:
    - "yamllint .github/workflows/"
    - "actionlint"
  verify:
    - "yamllint .github/workflows/"
    - "actionlint"
why_it_matters_markdown: |-
  ## Why it matters

  Workflow YAML files must follow strict GitHub Actions schema rules. Common causes include incorrect indentation, unquoted expressions containing colons, invalid `on:` trigger syntax, missing required fields, or extra whitespace characters.

  ## Prevention

  - Install a YAML linter into your editor and CI pre-flight.
  - Use `actionlint` in CI: `actionlint .github/workflows/*.yml`.
  - Use GitHub's built-in workflow editor which validates syntax on save.
