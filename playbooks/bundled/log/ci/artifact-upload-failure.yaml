id: artifact-upload-failure
title: CI artifact upload or download failed
category: ci
severity: medium
base_score: 1.0
tags: [artifact, upload, download, ci, pipeline, storage]
stage_hints: [build, test, deploy]
domain: ci-config
class: artifact-failure
mode: artifact-upload-failed
summary: |-
  A CI job failed to upload a build artifact, or a downstream job failed to download an artifact produced by an earlier job. Pipeline stages that depend on the artifact cannot proceed.
diagnosis: |-
  ## Diagnosis

  A CI job failed to upload a build artifact, or a downstream job failed to download an artifact produced by an earlier job. Pipeline stages that depend on the artifact cannot proceed.
fix: |-
  ## Fix steps

  1. Check whether the producing job actually ran and exited zero before the upload step.
  2. Verify the artifact path glob matches the actual output location (e.g., `dist/**` vs `build/dist/**`).
  3. For GitHub Actions: if the log says `No files were found with the provided path`, resolve the path from the repository root or upload from an absolute path that exists in the runner's filesystem.
  4. For GitHub Actions container jobs: confirm the upload step can see the build output path from the host runner context, not just from inside the container.
  5. For GitLab CI: verify `artifacts.paths` points at files produced by the job and check whether the runner or coordinator is rejecting the upload.
  6. For CircleCI: confirm `store_artifacts` path matches the actual build output directory.
  7. For Jenkins: check Archivable artifacts path in the post section of the Jenkinsfile.
validation: |-
  ## Validation

  - Re-run the failing workflow step.
  - Confirm the original failure signature for CI artifact upload or download failed is gone.
match:
  any:
    - "artifact upload failed"
    - "failed to upload artifact"
    - "upload artifact"
    - "Error uploading"
    - "artifact not found"
    - "No artifact found"
    - "Unable to find artifact"
    - "download artifact"
    - "Uploading artifacts..."
    - "No files were found with the provided path"
    - "No artifacts will be uploaded"
    - "Uploading artifacts to coordinator... forbidden"
    - "responseStatus=403 Forbidden"
  none:
    - "artifacts have expired"
    - "expired artifact"
    - "Could not retrieve artifact"
    - "no artifacts to download"
    - "artifact download failed"
workflow:
  likely_files:
    - .github/workflows/
    - .gitlab-ci.yml
    - .circleci/config.yml
    - Jenkinsfile
  local_repro:
    - ls -R dist build out
  verify:
    - ls -R dist build out
why_it_matters: |-
  ## Why it matters

  Artifact failures occur when: storage quota is exceeded, the upload step was skipped because an early step failed, the artifact name or path pattern does not match the files produced, the upload step runs from a different working directory or filesystem view than the build step, or the CI coordinator rejects the upload request.

  ## Prevention

  - Always upload artifacts in an `if: always()` (GitHub Actions) or `when: always` (GitLab) block so they are preserved even when tests fail.
  - Use explicit, stable artifact names rather than glob patterns to prevent accidental mismatches.
  - Resolve upload paths from the repository root and add a pre-upload `ls -R <path>` check for critical artifacts.
  - Monitor artifact storage usage to avoid hitting quota limits.
  - For large artifacts, consider uploading to an external store (S3, GCS, Azure Blob) and passing the URL downstream rather than using the CI platform's artifact storage.
