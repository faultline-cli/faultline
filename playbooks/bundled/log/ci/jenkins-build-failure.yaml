id: jenkins-build-failure
title: Jenkins pipeline build failure
category: ci
severity: high
base_score: 1.0
tags: [jenkins, pipeline, groovy, ci]
stage_hints: [build, deploy, test]

match:
  any:
    - "BUILD FAILURE"
    - "hudson.remoting"
    - "org.jenkinsci.plugins"
    - "WorkflowScript"
    - "java.io.IOException"
    - "script returned exit code"
    - "hudson.AbortException"
    - "Finished: FAILURE"
    - "groovy.lang.MissingPropertyException"
    - "Unable to connect to Jenkins"

explain: >
  The Jenkins pipeline stage exited with a failure. Jenkins wraps most
  failures in Java-style stack traces that can hide the real root cause.

why: >
  The error may stem from a shell command within the pipeline, a Groovy
  scripting error in the Jenkinsfile, a plugin exception, or a lost agent
  connection. The stack trace prefix identifies which layer failed.

fix:
  - "Scroll past the Java stack trace to find `FAILED` or `Error:` — that's the root cause."
  - "For `hudson.AbortException`, find the step that called `error()` or check the pipeline script."
  - "For `java.io.IOException: remote file operation failed`, check the agent node is online."
  - "For `MissingPropertyException`, a pipeline variable or parameter is undefined."
  - Run the failing shell step locally to reproduce it outside Jenkins.

prevent:
  - "Add `timeout(time: 30, unit: 'MINUTES')` around long-running stages."
  - "Use `catchError(buildResult: 'FAILURE')` to capture partial failures with context."
  - Pin Jenkins plugin versions and test upgrades in a staging Jenkins instance.

workflow:
  likely_files:
    - Jenkinsfile
