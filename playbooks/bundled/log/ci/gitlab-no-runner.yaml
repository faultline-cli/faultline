id: gitlab-no-runner
title: GitLab CI job stuck — no matching runner
category: ci
severity: high
base_score: 1.0
tags: [gitlab, runner, stuck, ci]
stage_hints: [build, deploy, test]

match:
  any:
    - "This job is stuck because the project doesn't have any runners"
    - "This job is stuck because you don't have any active runners"
    - no runners available
    - "job is stuck"
    - runner not found
    - "waiting for a runner"

explain: >
  GitLab CI could not find an available runner that matches the job's tag
  requirements or the project has no registered runners at all.

why: >
  Jobs get stuck for one of three reasons: no runners are registered for the
  project or group, all matching runners are offline or busy, or the job
  requests tags that no runner provides.

fix:
  - "Check runner availability: Settings > CI/CD > Runners."
  - Ensure at least one runner is online and not paused.
  - If the job requires specific tags, confirm at least one runner has those tags.
  - "For group or instance runners, verify they are enabled for this project."
  - Start a new runner with `gitlab-runner register` if none are available.

prevent:
  - Set up auto-scaling runners so capacity adjusts to queue depth.
  - Monitor runner availability and alert when all runners go offline.
  - Avoid over-tagging jobs with rare runner tags that bottleneck the pipeline.

workflow:
  likely_files:
    - .gitlab-ci.yml
