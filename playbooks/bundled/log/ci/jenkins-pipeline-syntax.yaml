id: jenkins-pipeline-syntax
title: Jenkins pipeline Groovy or syntax error
category: ci
severity: high
base_score: 1.0
tags: [jenkins, jenkinsfile, groovy, pipeline, declarative, scripted, ci]
stage_hints: [build]

match:
  any:
    - "WorkflowScript"
    - "Jenkinsfile"
    - "groovy.lang.MissingPropertyException"
    - "org.codehaus.groovy"
    - "No such DSL method"
    - "expected a step"
    - "unexpected token"
    - "started and exited without executing"
    - "Could not find any definition of"
    - "is not a valid stage name"
    - "Error in step"
    - "Failed to instantiate"
    - "hudson.model.Failure"
    - "Pipeline aborted due to stage failure"
    - "RejectedAccessException"

explain: >
  The Jenkins pipeline failed to parse or execute due to a Groovy syntax
  error, an undefined DSL step, or a security restriction in the Jenkins
  Script Security plugin.

why: >
  Jenkins pipelines are executed as Groovy scripts. Failures occur when:
  the `Jenkinsfile` contains Groovy syntax errors, a pipeline step (DSL
  method) is called that is not installed or has been renamed, the
  Declarative Pipeline syntax is violated, or the Script Security plugin
  blocks an unsafe method that requires explicit approval.

fix:
  - "Open the pipeline's Replay page in Jenkins and run the Groovy syntax check before retrying."
  - "For `No such DSL method`: verify the required Jenkins plugin is installed and enabled."
  - "For `RejectedAccessException`: approve the method in Jenkins > Manage Jenkins > Script Approval."
  - "For Declarative Pipeline syntax errors: use the Jenkins Declarative Linter at `<jenkins-url>/pipeline-model-converter/validate`."
  - "Check the full stack trace in the Jenkins build log — the line number points directly to the error."
  - "Wrap complex Groovy in a shared library to isolate and test it independently of the pipeline."

prevent:
  - Use the Jenkins Declarative Pipeline Linter as a pre-commit hook or lightweight CI step.
  - Prefer Declarative Pipeline syntax over Scripted Pipeline; it is validated at parse time.
  - Store shared pipeline logic in a Jenkins Shared Library with unit tests using the `JenkinsPipelineUnit` framework.
  - Review Script Security approvals as part of your change management process for Jenkinsfile changes.

workflow:
  likely_files:
    - Jenkinsfile
    - vars/
    - src/
