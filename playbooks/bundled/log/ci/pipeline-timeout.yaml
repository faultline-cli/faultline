id: pipeline-timeout
title: CI job or pipeline exceeded time limit
category: ci
severity: high
base_score: 1.0
tags: [timeout, ci, hung, pipeline]
stage_hints: [build, test, deploy]

match:
  any:
    - "Job's timeout exceeded"
    - "execution timeout"
    - "exceeded the maximum execution time"
    - "build timed out"
    - "pipeline timed out"
    - "timed out after"
    - "job timed out"
    - "canceled because a build timeout"
    - "Timeout: Timeout reached"
    - "ERROR: Job failed (system failure): job execution failed on runner"
    - "has been running for more than"

explain: >
  The CI job ran past its configured time limit and was killed by the CI system.
  This is a hard stop — no further steps ran.

why: >
  Common causes: a test is stuck waiting on a network call or socket, a build
  step hangs on user input, a dependency download stalls, or the workload genuinely
  takes longer than the limit allows.

fix:
  - Check the last progressing step in the logs and determine whether the job was still doing work or had stopped producing output entirely.
  - If a test or script is hanging, add an explicit per-command timeout and capture stack traces or debug output when the timeout fires.
  - "Remove interactive prompts and TTY-only behaviour from setup commands (`--yes`, `--non-interactive`, `CI=true`)."
  - Cache dependency downloads and split long-running build, test, or deploy stages into smaller jobs before increasing the global timeout.
  - Increase the CI timeout only after you have identified a bounded slow path that legitimately needs more time.

prevent:
  - Set per-step timeouts in addition to the job-level timeout so the failing command is obvious.
  - Add explicit timeout or watchdog settings to test runners, network-heavy scripts, and deploy commands.
  - Emit periodic progress logs or heartbeats for long-running steps so silent hangs are easy to distinguish from slow but healthy work.
  - Track median and p95 job duration by pipeline so regressions are visible before they start hitting the hard limit.
