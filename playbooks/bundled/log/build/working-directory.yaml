id: working-directory
title: Wrong working directory
category: build
severity: medium
base_score: 0.5
tags: [directory, path, config]
stage_hints: [build, test, deploy]

match:
  any:
    - no such file or directory
    - cannot find the path specified
    - chdir
    - not a git repository
    - "error: no such file"
    - working directory not found
    - failed to change directory
  none:
    - fixture
    - factory
    - testdata
    - seed

explain: >
  A command ran in an unexpected working directory. Relative paths expected a
  specific directory layout that did not exist at the time of execution.

why: >
  CI jobs sometimes change directory as part of a step but fail to restore the
  original directory, or a `working-directory` configuration in the workflow
  file points to a path that does not exist in the checked-out repository.

fix:
  - "Check the `working-directory` configuration in your CI workflow file."
  - "Use absolute paths or `$(pwd)` references where possible."
  - "Add `ls -la` before the failing step to confirm the directory contents."
  - Verify the repository structure matches what the workflow expects.

prevent:
  - "Use explicit `working-directory` steps rather than relying on implicit directory state."
  - Document expected working directory requirements in step names or comments.
  - Add a directory existence check at the start of jobs that depend on specific paths.
  - Prefer commands anchored from the repository root in reusable scripts so directory assumptions are not duplicated across workflows.
