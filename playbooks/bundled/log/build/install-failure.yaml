id: install-failure
title: Package installation failure
category: build
severity: high
base_score: 0.5
tags: [install, dependencies, npm, pip, apt]
stage_hints: [build]

match:
  any:
    - npm ERR! code E404
    - "npm ERR! 404 Not Found"
    - "ERROR: Could not find a version that satisfies"
    - "ERROR: No matching distribution found"
    - could not find package
    - package not found
    - apt-get install failed
    - "dpkg: error"
    - "E: Unable to locate package"
    - "failed to fetch"

explain: >
  The package installation step failed because a package or specific version
  could not be found in the configured registry or package index.

why: >
  The package may have been removed from the registry, unpublished, or the
  version constraint is too narrow. Private packages require authentication that
  may not be configured.

fix:
  - Re-run the exact install command locally with verbose logging so you can see which package name, version, or index URL failed.
  - Check that the package name and requested version actually exist in the configured registry or package index.
  - "For private registries, verify the CI credentials and config files are present before the install step runs (for example `.npmrc`, `pip.conf`, or registry-specific env vars)."
  - If the failure happens while building a native dependency, install the required compiler toolchain or system headers on the runner image.
  - If a package was removed or renamed, pin to a known-good published version or replace it with the maintained package.

prevent:
  - Use a lockfile or fully pinned constraints file so dependency resolution changes only happen in deliberate update jobs.
  - Mirror critical internal and third-party packages in a registry you control so public registry outages or removals do not block builds.
  - Keep registry configuration and auth bootstrap in a shared CI template so each pipeline uses the same package source settings.
  - Run a dependency install smoke job whenever the base build image or dependency manifest changes.
