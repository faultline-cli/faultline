id: syntax-error
title: Syntax error in source code
category: build
severity: critical
base_score: 1.0
tags: [syntax, parse, compile]
stage_hints: [build]
domain: source
class: compile-error
mode: generic-syntax-error
match:
  any:
    - "SyntaxError:"
    - unexpected token
    - parse error
    - syntax error near
    - unterminated string literal
    - expected ';' before
    - "error: expected expression"
    - invalid syntax
    - "Variable not in scope"
    - "Not in scope:"
    - "unknown type name"
    - "Failed to load interface for"
    - "Couldn't match type"
    - "** (CompileError)"
    - "Compilation failed"
    - "undefined reference to"
summary: |-
  The compiler or interpreter hit invalid source syntax and stopped before the
  build could continue.
diagnosis: |-
  ## Diagnosis

  The failing source file contains a parse error such as an unclosed delimiter,
  invalid token, missing separator, or unresolved merge marker.

  This is a hard failure: the code must be corrected before the build can pass.
fix: |-
  ## Fix steps

  1. Look at the file and line number from the error message.
  2. Run the compiler or linter locally to reproduce the exact parse failure.
  3. Check for unclosed brackets, missing separators, or merge conflict
     markers such as `<<<<<<<`, `=======`, and `>>>>>>>`.
  4. If the file was generated or transformed, rebuild the generated output
     from source rather than patching the artifact by hand.
validation: |-
  ## Validation

  - Re-run the parser, compiler, or linter locally.
  - Confirm the build step completes without the syntax error.
why_it_matters: |-
  ## Why it matters

  Syntax failures are immediate and deterministic. They usually indicate code
  that was never successfully parsed in the same shape now running in CI.

  ## Prevention

  - Run a linter or type-checker as a pre-commit hook.
  - Enable editor integration that highlights syntax errors in real time.
  - Require all CI jobs to pass before merging.
  - Keep generated code and hand-written source separate so parse errors are
    easier to trace to the real source of change.
workflow:
  likely_files:
    - src/
    - internal/
    - .github/workflows/*.yml
  local_repro:
    - go build ./...
  verify:
    - go build ./...
