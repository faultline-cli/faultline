id: runtime-mismatch
title: Python, Ruby, or Go runtime version mismatch
category: build
severity: high
base_score: 1.0
tags: [node, python, ruby, go, java, version]
stage_hints: [build, test]
summary: |-
  The installed Python, Ruby, or Go runtime does not satisfy the version
  constraint declared by the project. The build is using a language runtime
  outside the version range expected by the repository or dependency set.
diagnosis: |-
  ## Diagnosis

  The installed Python, Ruby, or Go runtime does not satisfy the version
  constraint declared by the project. This playbook is the generic fallback
  for those runtimes after more specific Node.js and Java rules have been
  considered.
fix: |-
  ## Fix steps

  1. Identify the required version from the repository source of truth:
     `.python-version`, `.ruby-version`, `.tool-versions`, `go.mod`, or the
     CI image tag.
  2. Pin the same version in the workflow or container image that runs the
     failing job.
  3. Re-run the build locally with the pinned runtime so you can confirm the
     version mismatch is resolved before re-running CI.
  4. If the failure came from a dependency upgrade, confirm the new minimum
     runtime requirement before relaxing project constraints or changing the
     CI image.
validation: |-
  ## Validation

  - Print the runtime version in CI and confirm it matches the version file or
    toolchain declaration.
  - Re-run the failing workflow step and confirm the original version error is
    gone.
match:
  any:
    - python version
    - requires python
    - requires ruby version
    - go version
    - unsupported python
    - ruby version
    - go.mod requires go
    - go version .* required
  none:
    - node version
    - engines.node
    - invalid engine node
    - setup-node
    - java version mismatch
    - unsupportedclassversionerror
    - "Cannot connect to the Docker daemon"
    - "permission denied while trying to connect to the Docker daemon socket"
    - "pull access denied"
    - "may require 'docker login'"
    - docker.sock
hypothesis:
  supports:
    - signal: runtime.language.version.mismatch
      weight: 0.8
  contradicts:
    - signal: runtime.node.version.mismatch
      weight: -0.6
    - signal: dependency.lockfile.sync_error
      weight: -0.4
    - signal: dependency.package.not_found
      weight: -0.6
  discriminators:
    - description: This fallback should only win when the runtime mismatch is real but not Node-specific.
      signal: runtime.language.version.mismatch
why_it_matters: |-
  ## Why it matters

  Runtime requirements drift over time. When the CI runner's default Python,
  Ruby, or Go version changes, or when the project begins requiring a newer
  toolchain, workflows that rely on runner defaults start failing without any
  change to the failure step itself.

  ## Prevention

  - Pin Python, Ruby, and Go versions explicitly in CI rather than relying on
    runner defaults.
  - Commit a single source of truth such as `.python-version`,
    `.ruby-version`, `.tool-versions`, or `go.mod`.
  - Update local dev tooling and CI images in the same change when runtime
    requirements move.
workflow:
  likely_files:
    - .python-version
    - .ruby-version
    - .tool-versions
    - go.mod
    - .github/workflows/*.yml
    - .github/workflows/*.yaml
  local_repro:
    - python --version
    - ruby --version
    - go version
  verify:
    - python --version
    - ruby --version
    - go version
