id: dependency-drift
title: Dependency version drift
category: build
severity: medium
base_score: 0.5
tags: [dependencies, lockfile, version]
stage_hints: [build]
match:
  any:
    - conflicting requirements
    - dependency conflict
    - version conflict
    - incompatible versions
    - requires a different version
    - "error: there is a conflict"
    - failed to resolve dependencies
    - dependency resolution failed
  none:
    - npm error code ERESOLVE
    - npm ERR! code ERESOLVE
    - ERESOLVE unable to resolve dependency tree
    - --legacy-peer-deps
    - could not find artifact
    - could not resolve all files for configuration
    - transfer failed for
    - pluginresolutionexception
    - could not resolve dependencies for project
hypothesis:
  supports:
    - signal: dependency.resolution.conflict
      weight: 0.7
  contradicts:
    - signal: dependency.lockfile.sync_error
      weight: -0.6
    - signal: dependency.cache.corrupt
      weight: -0.4
    - signal: runtime.version.mismatch
      weight: -0.4
  discriminators:
    - description: Resolver conflict wording points to incompatible dependency requirements rather than stale generated files.
      signal: dependency.resolution.conflict
  excludes:
    - signal: dependency.hash.mismatch
delta_boost:
  - signal: dependency.manifest.changed
    weight: 0.5
  - signal: dependency.lockfile.changed
    weight: 0.4

summary: |-
  Dependency constraints have drifted apart enough that the package manager
  cannot compute a valid install plan.
diagnosis: |-
  ## Diagnosis

  Two or more packages now require incompatible versions of a shared
  dependency, so resolution fails before installation can begin.
fix: |-
  ## Fix steps

  1. Re-run dependency resolution from a clean cache or clean environment to
     confirm the conflict is reproducible.
  2. Inspect the dependency tree with the native tool, such as `npm ls`,
     `pipdeptree`, `bundle viz`, or `go mod graph`.
  3. Regenerate the lockfile with the team-standard tool and version, then
     commit the result instead of hand-editing generated files.
  4. Pin, upgrade, or replace the conflicting dependency pair so top-level
     constraints agree on a compatible range.
  5. If the conflict appears only in CI, align the runtime or package manager
     version with local development before changing dependency constraints.
validation: |-
  ## Validation

  - Re-run dependency resolution from a clean environment.
  - Confirm the lockfile and install step complete without version conflicts.
why_it_matters: |-
  ## Why it matters

  Version drift tends to accumulate silently until an unrelated update tips the
  resolver into an impossible state. At that point the breakage often lands far
  from the original change that caused the incompatibility.

  ## Prevention

  - Use a lockfile for all projects and regenerate it only through one
    canonical toolchain version.
  - Update related dependency families together.
  - Run a dependency resolution check in CI on every manifest or lockfile
    change.
  - Avoid manual edits to generated lockfiles.
workflow:
  likely_files:
    - package.json
    - package-lock.json
    - requirements.txt
    - go.mod
  local_repro:
    - npm ls
    - pipdeptree
    - bundle viz
    - go mod graph
  verify:
    - npm ls
    - pipdeptree
    - bundle viz
    - go mod graph
