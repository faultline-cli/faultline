id: gradle-wrapper-missing
title: Gradle wrapper not found or permission denied
category: build
severity: medium
base_score: 1.0
tags: [gradle, java, android, wrapper, gradlew]
stage_hints: [build]

match:
  any:
    - "gradlew: not found"
    - "gradlew: command not found"
    - "Permission denied.*gradlew"
    - "./gradlew: No such file or directory"
    - "Cannot find a gradle wrapper"
    - "Gradle wrapper not found"
    - "Could not find or load main class org.gradle.wrapper"
    - "gradle-wrapper.jar"

explain: >
  The Gradle wrapper script (`gradlew`) is missing, not executable, or the
  wrapper JAR (`gradle/wrapper/gradle-wrapper.jar`) is absent from the
  repository. CI cannot start the Gradle build.

why: >
  The wrapper script and its JAR must be committed to the repository so CI
  runners can bootstrap Gradle without a pre-installed global version. If
  `.gitignore` was misconfigured to exclude `gradlew` or the `gradle/` folder,
  or if the files were not added to version control, the CI build fails.

fix:
  - "Ensure `gradlew`, `gradlew.bat`, and `gradle/wrapper/` are committed: `git add gradlew gradle/wrapper/`."
  - "Make `gradlew` executable: `chmod +x gradlew && git update-index --chmod=+x gradlew`."
  - "Generate the wrapper if missing: `gradle wrapper --gradle-version <version>`."
  - Check that `.gitignore` does not accidentally exclude `gradlew` or `gradle/wrapper/`.

prevent:
  - Commit the Gradle wrapper files as part of the initial project setup, not after the fact.
  - Add a CI step that verifies `gradlew` exists and is executable before running the build.
  - Never add `gradlew` to `.gitignore`.

workflow:
  likely_files:
    - gradlew
    - gradle/wrapper/gradle-wrapper.properties
    - gradle/wrapper/gradle-wrapper.jar
    - .gitignore
  local_repro:
    - ls -la gradlew gradle/wrapper/
    - git status gradlew gradle/wrapper/
