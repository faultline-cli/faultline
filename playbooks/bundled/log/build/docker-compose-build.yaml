id: docker-compose-build
title: Docker Compose build failure
category: build
severity: high
base_score: 1.0
tags: [docker-compose, docker, build, container]
stage_hints: [build]

match:
  any:
    - "docker-compose build"
    - "docker compose build"
    - "Service build failed"
    - "Error response from daemon"
    - "failed to solve"
    - "COPY failed: file not found"
    - "Service 'app' failed to build"
    - "compose"
    - "COPY failed"
    - "ADD failed"

explain: >
  A `docker compose build` (or `docker-compose build`) step failed to produce
  an image for one of the defined services. The step that failed is indicated
  by the service name in the error output.

why: >
  Compose build failures usually mirror standalone Dockerfile build errors:
  a missing file in the build context, an invalid instruction, or a base image
  that cannot be pulled. Compose adds a layer of variable interpolation which
  can cause additional issues if service names or build args are misconfigured.

fix:
  - "Run `docker compose build <service> --no-cache --progress=plain` to rebuild with verbose output."
  - "For `COPY failed: file not found`: verify the file path is relative to the build context."
  - "For `Service build failed`: check `build.context` and `build.dockerfile` in `docker-compose.yml`."
  - "Expand environment variables manually to confirm they resolve correctly."

prevent:
  - Use `--build-arg` to pass dynamic values instead of relying on host environment variables.
  - Add a `.dockerignore` file to reduce the build context size and avoid stale file issues.
  - Build images in CI using BuildKit (`DOCKER_BUILDKIT=1`) for better error messages.

workflow:
  likely_files:
    - docker-compose.yml
    - docker-compose.override.yml
    - Dockerfile
