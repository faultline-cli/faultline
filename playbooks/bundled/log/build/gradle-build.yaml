id: gradle-build
title: Gradle build failure
category: build
severity: high
base_score: 1.0
tags: [gradle, java, kotlin, android, build]
stage_hints: [build]
summary: |-
  Gradle exited with a non-zero status, indicating one or more tasks failed. The `FAILURE:` block in the output identifies the first task that failed and the root cause.
diagnosis_markdown: |-
  ## Diagnosis

  Gradle exited with a non-zero status, indicating one or more tasks failed. The `FAILURE:` block in the output identifies the first task that failed and the root cause.
fix_markdown: |-
  ## Fix steps

  1. Read the `What went wrong:` block — it contains the direct cause and file location.
  2. For `Could not resolve`: check the repository URL and any private repo credentials.
  3. For `Execution failed for task ':compileJava'`: fix the Java compilation errors listed below.
  4. Run `./gradlew <task> --stacktrace` locally for the full exception chain.
  5. For daemon issues: run `./gradlew --no-daemon` to rule out cached state.
validation_markdown: |-
  ## Validation

  - Re-run the local reproduction command after the fix.
  - ./gradlew build --stacktrace
match:
  any:
    - "BUILD FAILED"
    - "FAILURE: Build failed with an exception"
    - "What went wrong:"
    - "Could not resolve"
    - "Could not download"
    - "Execution failed for task"
    - "Gradle build daemon"
    - "Could not GET"
    - "Connection refused"
    - "Could not find"
    - "compileSdkVersion"
    - "Gradle version"
  none:
    - "BUILD SUCCESS"
    - "imported and not used"
    - "declared and not used"
    - "undefined: "
workflow:
  likely_files:
    - build.gradle
    - build.gradle.kts
    - settings.gradle
    - gradlew
  local_repro:
    - ./gradlew build --stacktrace
why_it_matters_markdown: |-
  ## Why it matters

  Gradle failures can stem from: dependency resolution errors (private repository authentication, unavailable version), task compilation errors, Android SDK not installed, or an incompatible Gradle wrapper version.

  ## Prevention

  - Cache `~/.gradle/caches` between CI runs to avoid repeated dependency downloads.
  - Pin the Gradle wrapper version in `gradle/wrapper/gradle-wrapper.properties`.
  - Enable `--build-cache` in CI to reuse task outputs across runs.
