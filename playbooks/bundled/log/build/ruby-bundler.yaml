id: ruby-bundler
title: Bundler dependency mismatch
category: build
severity: medium
base_score: 1.0
tags: [ruby, bundler, gems, dependencies]
stage_hints: [build]
summary: |-
  Bundler could not resolve or install the required gems. This typically means the Gemfile.lock is missing, out of sync, or incompatible with the Ruby version on the runner.
diagnosis_markdown: |-
  ## Diagnosis

  Bundler could not resolve or install the required gems. This typically means the Gemfile.lock is missing, out of sync, or incompatible with the Ruby version on the runner.
fix_markdown: |-
  ## Fix steps

  1. Run `bundle install` locally and commit the updated `Gemfile.lock`.
  2. Ensure the `.ruby-version` or `Gemfile` Ruby version requirement matches the CI runner.
  3. Add `bundle exec` as a prefix to gem-based commands in your CI scripts.
validation_markdown: |-
  ## Validation

  - Re-run the failing workflow step.
  - Confirm the original failure signature for Bundler dependency mismatch is gone.
match:
  any:
    - "bundler: command not found"
    - "could not find gem"
    - "your ruby version is"
    - "you need to install the following gems"
    - "bundler: failed to load command"
    - gemfile.lock not found
why_it_matters_markdown: |-
  ## Why it matters

  Bundler uses Gemfile.lock to guarantee reproducible installs. If the lockfile is absent or was generated on a different Ruby version, Bundler cannot satisfy all dependency constraints.

  ## Prevention

  - Commit `Gemfile.lock` to source control.
  - Pin the Ruby version explicitly in the Gemfile: `ruby '3.x.y'`.
  - Cache the bundler directory in CI to speed up installs and detect drift early.
