id: dotnet-build
title: .NET/C# build or compile failure
category: build
severity: high
base_score: 1.0
tags: [dotnet, csharp, msbuild, compile, build]
stage_hints: [build]
summary: |-
  The .NET build toolchain (MSBuild via `dotnet build` or `dotnet test`) rejected
  one or more C# or F# source files. The build cannot produce output until the
  compiler errors are resolved.
diagnosis_markdown: |-
  ## Diagnosis

  MSBuild exited with `Build FAILED` because the C# or F# compiler emitted one
  or more hard errors (`error CS####` or `error MSB####`). These are always
  deterministic: the same source must be fixed before the build carries on.

  Common causes:
  - A type, namespace, or assembly reference was added to one file but the
    corresponding package or `using` directive is missing.
  - A method signature changed without updating callers.
  - An interface or abstract member was added without implementing it in the
    concrete class.
  - A conditional compile symbol (e.g., `#if DEBUG`) left a code path in an
    invalid state.
fix_markdown: |-
  ## Fix steps

  1. Run `dotnet build` locally and read the first error in the output:

     ```bash
     dotnet build 2>&1 | grep -E "^.*error (CS|MSB|FS)[0-9]+" | head -20
     ```

  2. For `error CS0246` (type or namespace not found): add the missing `using`
     directive or install the NuGet package that provides the type.
  3. For `error CS0029` (cannot implicitly convert): fix the assignment or add
     an explicit cast.
  4. For `error MSB####` (MSBuild configuration): check that the project
     file's `<TargetFramework>`, `<PackageReference>`, and `<ProjectReference>`
     entries are consistent.
  5. Run `dotnet restore` before `dotnet build` if NuGet packages are out of
     date — restore failures produce `error NU####` codes, not `CS####`.
validation_markdown: |-
  ## Validation

  - Run `dotnet build --no-restore` locally and confirm the build exits zero.
  - Confirm CI reports `Build succeeded` with zero errors.
why_it_matters_markdown: |-
  ## Why it matters

  .NET compilation errors are deterministic. Every downstream step — unit tests,
  integration tests, container image builds, publish — depends on a successful
  compile. An unresolved `CS####` error is always the root cause, not a symptom.

  ## Prevention

  - Run `dotnet build` as a pre-push hook or CI gate on every pull request.
  - Pin the target framework (`<TargetFramework>`) and runtime identifier in the
    project file so upgrades are explicit, not implicit.
  - Use nullable reference type annotations (`<Nullable>enable</Nullable>`) to
    catch null dereference patterns at compile time rather than at runtime.
match:
  any:
    - "Build FAILED."
    - "error CS"
    - "error MSB"
    - "MSBUILD : error"
    - "dotnet build exited with"
    - "dotnet publish failed"
    - "error FS"
  none:
    - "dotnet restore"
    - "error NU"
    - "Build succeeded"
    - "warning CS"
    - "0 Error(s)"
    - "imported and not used"
    - "declared and not used"
    - "undefined: "
workflow:
  likely_files:
    - "**/*.csproj"
    - "**/*.sln"
    - "**/*.fsproj"
    - global.json
  local_repro:
    - dotnet restore
    - dotnet build
  verify:
    - dotnet build --no-restore
