id: cache-corruption
title: Corrupted or stale dependency cache
category: build
severity: medium
base_score: 0.5
tags: [cache, dependencies, build]
stage_hints: [build]

match:
  any:
    - cache is corrupted
    - corrupt cache
    - invalid cache
    - cache hit but install failed
    - checksum mismatch
    - hash mismatch
    - unexpected end of archive
    - corrupted tar archive
    - bad gzip

explain: >
  The CI dependency cache was restored successfully but the cached contents are
  corrupt or were created on an incompatible platform, causing installation or
  linking to fail.

why: >
  Build caches can become stale after tool upgrades (e.g. a new npm or pip
  version that uses a different binary format), after OS upgrades on the runner,
  or due to partial writes when a previous CI job was interrupted.

fix:
  - Delete the CI cache and allow it to rebuild from scratch.
  - Invalidate the cache by changing the cache key (e.g., append a version suffix).
  - For GitHub Actions, clear the cache via Settings › Actions › Caches.

prevent:
  - Include the tool version in the cache key so upgrades automatically invalidate the old cache.
  - "Validate the cache after restoration with a fast integrity check (e.g., `npm ci --prefer-offline`)."
  - Set a short cache TTL to prevent caches from becoming permanently stale.
