id: cache-corruption
title: Corrupted or stale dependency cache
category: build
severity: medium
base_score: 0.5
tags: [cache, dependencies, build]
stage_hints: [build]
match:
  any:
    - cache is corrupted
    - corrupt cache
    - invalid cache
    - cache hit but install failed
    - checksum mismatch
    - hash mismatch
    - unexpected end of archive
    - corrupted tar archive
    - bad gzip
summary: |-
  CI restored a dependency cache, but the cached contents were stale,
  corrupted, or built for an incompatible environment.
diagnosis_markdown: |-
  ## Diagnosis

  The cache layer existed and restored successfully, but one or more cached
  artifacts could not be trusted for the current build.

  This usually happens after toolchain upgrades, runner OS changes, or partial
  writes from an interrupted previous job.
fix_markdown: |-
  ## Fix steps

  1. Delete the CI cache and allow it to rebuild from scratch.
  2. Invalidate the cache by changing the cache key, for example by appending a
     version suffix.
  3. For GitHub Actions, clear the cache via Settings > Actions > Caches.
  4. If the cache stores platform-specific artifacts, verify the key includes
     OS, architecture, and toolchain version before restoring it again.
validation_markdown: |-
  ## Validation

  - Re-run the build from a cold cache.
  - Confirm dependency install or linking succeeds without archive or checksum
    corruption.
why_it_matters_markdown: |-
  ## Why it matters

  A bad cache can fail builds repeatedly and nondeterministically across many
  branches until someone invalidates it. The broken cache becomes shared build
  infrastructure rather than a single-job problem.

  ## Prevention

  - Include the tool version in the cache key so upgrades invalidate old cache
    content automatically.
  - Validate the cache after restoration with a fast integrity check.
  - Set a short cache TTL to prevent caches from becoming permanently stale.
  - Avoid caching mutable build outputs that can be partially written when jobs
    are canceled or retried.
workflow:
  likely_files:
    - .github/workflows/*.yml
    - .github/workflows/*.yaml
    - Dockerfile
    - package-lock.json
  local_repro:
    - rm -rf ~/.cache
  verify:
    - rm -rf ~/.cache
