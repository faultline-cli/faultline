id: go-sum-missing
title: Missing go.sum entry
category: build
severity: medium
base_score: 1.0
tags: [go, modules, dependencies]
stage_hints: [build]

match:
  any:
    - missing go.sum entry for module providing package
    - go.sum file is not up to date
    - verifying module
    - no required module provides

explain: >
  The go.sum file is missing a checksum entry for a dependency that the build
  requires. Go refuses to proceed without a verified checksum.

why: >
  go.sum acts as a lock file for module checksums. If a new dependency was
  added with `go get` but `go mod tidy` was not run, or if the go.sum was not
  committed, the CI build will fail.

fix:
  - "Run `go mod tidy` with the same Go version used in CI so the module graph is recalculated consistently."
  - "If the error says no required module provides a package, add or correct the dependency first with `go get <module>` before re-running `go mod tidy`."
  - "Commit both `go.mod` and `go.sum` if either file changed; checksum and version updates often move together."
  - "If the dependency is private, set `GOPRIVATE` and `GONOSUMDB` for the module path and verify CI can authenticate to the source repository."
  - "If a stale module cache is involved, clear it with `go clean -modcache` and rerun the build once."

prevent:
  - "Run `go mod tidy` in CI and fail the job when it changes `go.mod` or `go.sum`: `git diff --exit-code go.mod go.sum`."
  - Keep the local and CI Go toolchain versions aligned so module resolution stays stable across environments.
  - Document private module settings (`GOPRIVATE`, `GONOSUMDB`, credentials) in the shared CI template instead of relying on per-runner setup.

workflow:
  likely_files:
    - go.mod
    - go.sum
  local_repro:
    - go mod tidy
    - go test ./...
  verify:
    - git diff --exit-code go.mod go.sum
    - go test ./...
