id: dns-resolution
title: DNS resolution failure
category: network
severity: medium
base_score: 1.0
tags: [dns, network, host, resolution]
stage_hints: [build, deploy]
summary: |-
  The runner could not resolve a hostname to an IP address, so the network call failed before it could connect.
diagnosis_markdown: |-
  ## Diagnosis

  The runner could not resolve a hostname to an IP address, so the network call failed before it could connect.
fix_markdown: |-
  ## Fix steps

  1. Verify the hostname in the failing command or configuration for typos.
  2. Manually resolve the host from inside the CI environment to confirm it is
     reachable:

     ```bash
     nslookup <hostname>
     dig +short <hostname>
     getent hosts <hostname>
     ```

     If DNS resolution works from the runner but the job still fails, the
     hostname may be coming from a misconfigured secret or environment variable.

  3. Check whether the hostname is internal-only and requires VPN, VPC DNS, or
     a private resolver. CI runners on cloud providers may not have access to
     private DNS zones by default.
  4. Retry the job once to rule out a transient resolver outage.
  5. If the hostname comes from configuration, trace the resolved value in CI
     logs to confirm the job is not using the wrong environment or secret.
validation_markdown: |-
  ## Validation

  - `dig +short <hostname>` or `nslookup <hostname>` — confirm successful
    resolution from the runner before re-running the job.
  - Re-run the failing step and confirm the DNS lookup no longer fails.
match:
  any:
    - no such host
    - temporary failure in name resolution
    - name or service not known
    - getaddrinfo enotfound
    - "dial tcp: lookup"
    - could not resolve host
    - nodename nor servname provided
why_it_matters_markdown: |-
  ## Why it matters

  DNS failures can come from typos in hostnames, transient resolver outages, missing private DNS configuration, or network policies that block access to the resolver.

  ## Prevention

  - Keep service endpoints centralized in configuration rather than duplicated across workflows.
  - Add environment-specific connectivity checks for critical internal hosts.
  - Monitor resolver health on persistent runners or clusters.
  - Document which internal domains require private DNS so new runners are provisioned with the correct resolver settings.
