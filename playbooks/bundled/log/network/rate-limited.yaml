id: rate-limited
title: API or registry rate limit exceeded
category: network
severity: medium
base_score: 0.9
tags: [rate-limit, 429, api, registry, throttling]
stage_hints: [build, deploy, test]

match:
  any:
    - "429 Too Many Requests"
    - "rate limit exceeded"
    - "rate limited"
    - "toomanyrequests"
    - "You have reached your pull rate limit"
    - "TOOMANYREQUESTS"
    - "API rate limit exceeded"
    - "exceeded the rate limit"
    - "Retry-After"
    - "throttled"
    - "quota exceeded"

explain: >
  A request to an external API or container registry was rejected because the
  rate limit for the calling identity was reached. The operation did not complete.

why: >
  Docker Hub enforces pull rate limits per anonymous IP (100 pulls/6h) and per
  free account (200 pulls/6h). GitHub API enforces 60 unauthenticated requests
  per hour per IP. Running many parallel CI jobs from the same IP can exhaust
  the limit quickly.

fix:
  - "For Docker Hub: authenticate pulls with a Docker Hub account via `docker login`."
  - "For GitHub API: use an authenticated token (`GITHUB_TOKEN` or a PAT) for API calls."
  - Cache Docker images or downloaded assets between runs to avoid repeated requests.
  - Spread CI jobs across time or use a mirror/proxy registry.

prevent:
  - Authenticate all registry and API calls in CI — authenticated limits are higher.
  - Use a pull-through cache (e.g. ECR pull-through cache for Docker Hub images).
  - Monitor rate limit headers (`X-RateLimit-Remaining`) and back off proactively.

workflow:
  likely_files:
    - .github/workflows/*.yml
    - .gitlab-ci.yml
    - Dockerfile
