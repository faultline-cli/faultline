id: network-timeout
title: Network request timeout
category: network
severity: medium
base_score: 1.0
tags: [network, timeout, http, connection]
stage_hints: [build, deploy]
summary: |-
  A network request exceeded its timeout limit. The remote host did not respond within the expected window, causing the CI step to fail.
diagnosis_markdown: |-
  ## Diagnosis

  A network request exceeded its timeout limit. The remote host did not respond within the expected window, causing the CI step to fail.
fix_markdown: |-
  ## Fix steps

  1. Identify the exact host and command that timed out — registry, API,
     artifact store, or internal service — so you know where to look.
  2. Test connectivity directly from the runner with a short timeout:

     ```bash
     curl -v --max-time 10 <URL>
     nc -zv <host> <port>
     ```

  3. Retry the failed job once to separate a transient blip from a persistent
     routing or service problem.
  4. Check the service status page and confirm the endpoint is healthy before
     adjusting timeout settings.
  5. Verify the CI runner can reach the required host through any proxy,
     firewall, or egress policy applied in that environment.
  6. Increase client-side timeout settings only when the endpoint is confirmed
     healthy and the operation is legitimately large or slow.
validation_markdown: |-
  ## Validation

  - `curl -v --max-time 10 <URL>` completes within 10 seconds from the runner.
  - Re-run the failing step and confirm it completes without a timeout error.
match:
  any:
    - connection timed out
    - read timeout
    - dial timeout
    - context deadline exceeded
    - operation timed out
    - request timeout
    - "ETIMEDOUT"
    - "ECONNRESET"
    - failed to connect
  none:
    - no such host
    - temporary failure in name resolution
    - name or service not known
    - getaddrinfo enotfound
    - "dial tcp: lookup"
    - could not resolve host
    - nodename nor servname provided
    - "go test -timeout"
    - "Test timed out"
    - "async test timed out"
why_it_matters_markdown: |-
  ## Why it matters

  CI runners may have restricted outbound network access, or the remote service (package registry, API endpoint, artifact store) is temporarily unavailable or slow. Transient network congestion also causes timeouts.

  ## Prevention

  - Mirror critical packages, container images, and build artifacts in infrastructure you control to reduce dependency on public services.
  - Add explicit retry and exponential back-off behaviour to network operations that are safe to repeat.
  - Keep runner egress, DNS, and proxy settings under test with a lightweight connectivity check in CI.
  - Separate optional external calls from the critical path so transient upstream slowness does not fail the whole pipeline unnecessarily.
