id: connection-refused
title: Service or dependency connection refused
category: network
severity: high
base_score: 1.0
tags: [network, connection, refused, service, dependency]
stage_hints: [build, test, deploy]

match:
  any:
    - "connection refused"
    - "Connection refused"
    - "ECONNREFUSED"
    - "connect: connection refused"
    - "dial tcp"
    - "no connection could be made"
    - "failed to connect"
    - "is the server running"
    - "ConnectionRefusedError"
    - "connection was refused"
  none:
    - BUILD FAILED
    - "FAILURE: Build failed with an exception"
    - "What went wrong:"
    - operation timed out
    - read timeout
    - dial timeout
    - "ETIMEDOUT"

explain: >
  A TCP connection attempt was actively refused by the target host. The service
  is either not running on that address and port, has not finished starting up,
  or is bound to a different interface.

why: >
  In CI, this typically means a test or build step tried to contact a service
  (database, cache, API) before the service was ready to accept connections.
  It can also mean the service container never started, or the wrong host/port
  is configured.

fix:
  - "Add a readiness probe before the step that connects: `wait-for-it.sh <host>:<port>`."
  - Verify the service container started successfully by checking its logs or status.
  - Confirm the host and port match what the service is actually bound to.
  - "For Docker services: use the service name as the hostname, not `localhost`."

prevent:
  - Use service health checks in Docker Compose or CI service definitions.
  - Add explicit wait steps with a timeout and retry loop.
  - Define service startup order in CI to avoid race conditions.
  - Standardize service hostnames and ports in shared test helpers or env files so jobs do not guess connection targets.

workflow:
  likely_files:
    - docker-compose.yml
    - .github/workflows/*.yml
    - .gitlab-ci.yml
