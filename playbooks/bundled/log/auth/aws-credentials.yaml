id: aws-credentials
title: AWS credentials missing or invalid
category: auth
severity: high
base_score: 1.0
tags: [aws, credentials, iam, auth]
stage_hints: [build, deploy]

match:
  any:
    - "NoCredentialProviders"
    - "no EC2 instance role found"
    - "InvalidClientTokenId"
    - "AuthFailure"
    - "AccessDenied"
    - "Unable to locate credentials"
    - "An error occurred (AuthFailure)"
    - "could not load credentials"
    - "ExpiredTokenException"
    - "InvalidSignatureException"
    - "AWS was not able to validate the provided access credentials"
    - "The security token included in the request is expired"
  none:
    - "docker login"
    - "registry"

explain: >
  The job could not authenticate with AWS. Either no credentials are present
  in the environment, the credentials are expired, or the IAM principal does
  not have permission to perform the requested action.

why: >
  AWS SDK clients look for credentials in this order: environment variables,
  shared credentials file, IAM instance profile, and ECS task role. In CI,
  the most common failure is missing or expired `AWS_ACCESS_KEY_ID` /
  `AWS_SECRET_ACCESS_KEY` environment secrets.

fix:
  - "Verify `AWS_ACCESS_KEY_ID`, `AWS_SECRET_ACCESS_KEY`, and `AWS_DEFAULT_REGION` are set as CI secrets."
  - "For `ExpiredTokenException`: rotate the IAM access key or refresh the assumed role session."
  - "For `AccessDenied`: the IAM user or role lacks the permission — update the IAM policy."
  - "Prefer OIDC-based role assumption (`aws-actions/configure-aws-credentials`) over long-lived keys."

prevent:
  - Use short-lived OIDC tokens from your CI provider instead of static IAM keys.
  - Set key rotation reminders and update CI secrets proactively.
  - Scope IAM policies to the minimum required actions and resources.

workflow:
  likely_files:
    - .github/workflows/*.yml
    - .github/workflows/*.yaml
    - .gitlab-ci.yml
    - buildspec.yml
  local_repro:
    - aws sts get-caller-identity
  verify:
    - aws sts get-caller-identity
