id: git-auth
title: Git authentication failure
category: auth
severity: high
base_score: 1.0
tags: [git, github, ssh, auth]
stage_hints: [build, deploy]
summary: |-
  The CI runner could not authenticate with the remote Git repository. This prevents cloning, fetching, or pushing code.
diagnosis_markdown: |-
  ## Diagnosis

  The CI runner could not authenticate with the remote Git repository. This prevents cloning, fetching, or pushing code.
fix_markdown: |-
  ## Fix steps

  1. Add a GITHUB_TOKEN or equivalent secret and configure git with `git config --global url.https://$TOKEN@github.com/.insteadOf https://github.com/`.
  2. For SSH-based workflows, add the deploy key or SSH key as a CI secret and load it with ssh-agent.
  3. Verify the token has the `repo` scope or the deploy key has read access to the repository.
  4. Check that the repository URL uses the correct scheme (HTTPS vs SSH) for the credentials you have.
validation_markdown: |-
  ## Validation

  - Re-run the failing workflow step.
  - Confirm the original failure signature for Git authentication failure is gone.
match:
  any:
    - terminal prompts disabled
    - could not read username
    - authentication failed for
    - repository not found
    - permission denied (publickey)
    - "remote: invalid username or password"
    - "fatal: credential helper"
  none:
    - Host key verification failed
    - "ssh: handshake failed"
    - no such identity
    - "ssh: connect to host"
why_it_matters_markdown: |-
  ## Why it matters

  CI environments disable interactive terminal prompts, so Git cannot prompt for a username and password. Without a pre-configured credential or SSH key, the operation fails immediately.

  ## Prevention

  - Use a dedicated CI service account with the minimum repository permissions needed.
  - Prefer short-lived tokens (GitHub Actions GITHUB_TOKEN) over persistent PATs.
  - Document the required secret names in your repository README.
  - Add a lightweight clone or fetch smoke step to validate repository credentials before long build stages begin.
