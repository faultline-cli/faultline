id: npm-publish-auth
title: npm publish authentication failure
category: auth
severity: high
base_score: 1.0
tags: [npm, publish, registry, auth, token]
stage_hints: [build, deploy]

match:
  any:
    - "npm ERR! 401 Unauthorized"
    - "npm ERR! 403 Forbidden"
    - "npm ERR! code E401"
    - "npm ERR! code E403"
    - "npm ERR! You must be logged in"
    - "You need to authorize this machine"
    - "ENEEDAUTH"
    - "Unable to authenticate, need: Bearer"
    - "publish failed"
    - "Invalid npm token"
  none:
    - npm ci
    - package-lock.json

explain: >
  `npm publish` (or an equivalent publish step) failed because the npm registry
  rejected the authentication token. The package cannot be published until
  valid credentials are provided.

why: >
  In CI, npm publish requires either an `NPM_TOKEN` environment variable or a
  `.npmrc` file containing a valid token. Common causes are: the token is
  missing from CI secrets, the token was revoked, or the token does not have
  publish scope for the target package or scope.

fix:
  - "Set `NPM_TOKEN` as a CI secret and reference it in the publish step."
  - "Create or update `.npmrc` in the project root: `//registry.npmjs.org/:_authToken=${NPM_TOKEN}`"
  - "Regenerate the token at npmjs.com under Access Tokens with `Automation` type."
  - Verify the token has publish permission for the package scope (`@scope/package`).

prevent:
  - Use automation tokens (not user tokens) for CI publishing.
  - Store the token in CI secrets, never in committed files.
  - Add a provenance flag (`--provenance`) to publish signed packages.

workflow:
  likely_files:
    - .npmrc
    - package.json
    - .github/workflows/*.yml
