id: docker-auth
title: Docker registry authentication failure
category: auth
severity: high
base_score: 1.0
tags: [docker, registry, auth]
stage_hints: [build, deploy]
match:
  any:
    - pull access denied
    - authentication required
    - requested access to the resource is denied
    - "unauthorized: authentication required"
    - no basic auth credentials
    - "denied: requested access to the resource is denied"
  none:
    - failed to pull image
    - imagepullbackoff
    - errimagepull
    - back-off pulling image
    - manifest unknown
summary: |-
  CI could not authenticate to the container registry before an image pull or push.
diagnosis_markdown: |-
  ## Diagnosis

  Docker reached the registry, but the credentials used by CI were missing, expired, or scoped incorrectly for the target image.

  Typical causes:

  - the login step never ran
  - the secret value rotated without the workflow updating
  - the token can read one repo but not the image path being used
why_it_matters_markdown: |-
  ## Why it matters

  Registry auth failures block both build-time pulls and deploy-time pushes, so one bad credential can stop the whole pipeline.
fix_markdown: |-
  ## Fix steps

  1. Verify the registry credential configured in CI secrets has not expired or
     been rotated without updating the secret:
     - Docker Hub: Settings › Security › Access Tokens.
     - GitHub Container Registry (ghcr.io): Personal access tokens, scope
       `read:packages` / `write:packages`.
     - AWS ECR: token validity is 12 hours — use `aws ecr get-login-password`
       in a `before_script` step, not a static secret.

  2. Ensure the registry login step runs before any `docker pull` or `docker
     push` command:

     ```bash
     docker login <registry> -u "$REGISTRY_USER" --password-stdin <<< "$REGISTRY_TOKEN"
     ```

  3. Confirm the token has the correct repository scope for the image path
     being accessed (tokens scoped to one namespace cannot access another).

  4. Validate the credential locally:

     ```bash
     docker login <registry>
     docker pull <image>:<tag>
     ```

  5. After rotating a credential, update the CI secret and confirm the secret
     name in the workflow file matches exactly.
validation_markdown: |-
  ## Validation

  - Re-run the registry login step and confirm it exits 0.
  - Confirm the pull or push completes without `authentication required`.
  - Run one full CI job end-to-end after rotating the credential to verify
    the new secret wiring is correct.
workflow:
  likely_files:
    - Dockerfile
    - .github/workflows/*.yml
    - .github/workflows/*.yaml
    - docker-compose*.yml
  local_repro:
    - docker login <registry>
  verify:
    - docker login <registry>
