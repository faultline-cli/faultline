id: missing-test-fixture
title: Missing test fixture or seed data
category: test
severity: high
base_score: 1.0
tags: [test, fixture, seed, database, missing-data]
stage_hints: [test]

match:
  any:
    - "fixture not found"
    - "missing fixture"
    - "no such file or directory"
    - "FileNotFoundError"
    - "seed"
    - "fixture"
    - "factory"
    - "undefined method"
    - "ActiveRecord::RecordNotFound"
    - "could not find test data"
    - "test helper"
    - "before(:each) failed"
    - "beforeAll"
    - "setup failed"
    - "testdata"
  none:
    - chdir
    - working directory not found
    - failed to change directory
    - not a git repository

explain: >
  A test failed because it could not load a required fixture file, seed record,
  or test helper resource that was expected to exist before the test ran.

why: >
  Fixture errors occur when a fixture file is deleted or renamed without
  updating the tests that reference it, when a database migration removes a
  field or table that fixtures depend on, or when a CI environment starts
  without running the required seed step.

fix:
  - "Run the database seed step before the test suite: `rails db:seed`, `npm run db:seed`."
  - Check if the fixture file was recently renamed or deleted in the repo history.
  - "For factory errors: ensure the factory definition matches the current model schema."
  - Update the fixture or factory to match the current data model.

prevent:
  - Include fixture setup in a shared test setup script that runs automatically.
  - Add a CI lint step that validates all referenced fixture files exist.
  - When migrating, update all fixtures and factories in the same PR.
