id: flaky-test
title: Flaky test failure
category: test
severity: low
base_score: 0.5
tags: [test, flaky, intermittent, timing]
stage_hints: [test]

match:
  any:
    - failed on attempt
    - intermittent failure
    - test is flaky
    - flaky test
    - timeout waiting for
    - race condition detected
    - "retry attempt"
    - test passed on retry
    - sporadically fails

explain: >
  A test failed but the failure is not consistently reproducible. Flaky tests
  indicate timing dependencies, global state, or resource contention that
  produce different outcomes on each run.

why: >
  Flaky tests are most commonly caused by: shared global state between tests,
  async operations without explicit waits, time-dependent assertions, or
  reliance on external services that are sometimes unavailable.

fix:
  - Retry the failing test job once to confirm the failure is intermittent and not a permanent regression.
  - "Isolate the test and run it repeatedly with the same command CI uses (`go test -run TestName -count=20`, `pytest -k test_name -n 0`, or equivalent)."
  - Replace fixed sleeps with deterministic waits on observable conditions, event completion, or polling with a bounded timeout.
  - Remove shared global state, reused temp directories, fixed ports, and cross-test data dependencies by using explicit setup and teardown.
  - If the test depends on time, randomness, or external services, freeze the clock, record the random seed, or stub the dependency.

prevent:
  - Provide shared test helpers for polling, temporary resources, and fake clocks so new tests do not reintroduce timing hacks.
  - Track flaky-test rates and quarantine or repair tests that exceed an agreed failure threshold.
  - Run an order-randomized or repeated-test job on the main branch to catch hidden state coupling early.
  - Write tests so they are self-contained, idempotent, and safe to run in parallel.
