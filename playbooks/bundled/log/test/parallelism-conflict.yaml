id: parallelism-conflict
title: Test parallelism conflict
category: test
severity: medium
base_score: 0.5
tags: [test, parallel, concurrency, port, database]
stage_hints: [test]
summary: |-
  Parallel test execution caused a resource conflict: two tests tried to bind the same port, access the same fixture, or write to the same temporary file simultaneously.
diagnosis: |-
  ## Diagnosis

  Parallel test execution caused a resource conflict: two tests tried to bind the same port, access the same fixture, or write to the same temporary file simultaneously.
fix: |-
  ## Fix steps

  1. Reduce test parallelism with `-parallel 1` to confirm the conflict is parallelism-related.
  2. Allocate a unique port, database, or temp directory per test rather than sharing a fixed resource.
  3. Use test-specific prefixes or random ports in each test's setup.
  4. If the suite must share a resource, serialize only the affected tests instead of disabling parallelism globally.
validation: |-
  ## Validation

  - Re-run the failing workflow step.
  - Confirm the original failure signature for Test parallelism conflict is gone.
match:
  any:
    - resource is busy
    - test is not parallelizable
    - race detected
    - concurrent
    - "too many connections"
    - database locked
  none:
    - port conflict
    - failed to bind to port
    - cannot start service
    - CrashLoopBackOff
    - host port
    - EADDRINUSE
    - cannot assign requested address
hypothesis:
  supports:
    - signal: test.parallel.resource_conflict
      weight: 0.8
  contradicts:
    - signal: test.order.dependency
      weight: -0.4
    - signal: test.fixture.missing
      weight: -0.4
    - signal: test.timeout.detected
      weight: -0.3
  discriminators:
    - description: Shared-resource collisions under parallel load are more specific than a generic flaky or timeout symptom.
      signal: test.parallel.resource_conflict
why_it_matters: |-
  ## Why it matters

  Tests that were written to run sequentially are now running in parallel due to an increased `-parallel` value or a new CI matrix. Without resource isolation, they interfere with each other.

  ## Prevention

  - Design each test to be fully isolated and self-contained.
  - Avoid hardcoded ports or global singletons in test setup.
  - Run the full test suite in parallel locally before enabling parallel CI.
  - Provide shared helpers for ephemeral ports, temp databases, and per-test workspaces so resource isolation is the default.
workflow:
  likely_files:
    - docker-compose.yml
    - .github/workflows/*.yml
    - testdata/
    - internal/
  local_repro:
    - go test -parallel 1 ./...
  verify:
    - go test -parallel 1 ./...
