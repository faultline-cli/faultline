id: mock-assertion-failure
title: Mock or stub expectation not satisfied
category: test
severity: medium
base_score: 1.0
tags: [mock, stub, spy, expectation, test, unit-test]
stage_hints: [test]

match:
  any:
    - "Expected call.*not received"
    - "mock.*was not called"
    - "Unexpected call to"
    - "verify.*expectation"
    - "Expected.*times but was called"
    - "MockException"
    - "WantedButNotInvoked"
    - "TooManyActualInvocations"
    - "NoInteractionsWanted"
    - "UnsatisfiedExpectation"
    - "gomock"
    - "expected call"
    - "FAIL.*controller.go"
    - "wants.*got.*no call"

explain: >
  A mock or stub set up in the test did not receive the expected call, received
  too many calls, or was called with unexpected arguments. The test assertion
  framework detected the discrepancy.

why: >
  Mock expectation failures mean the code under test is not calling its
  collaborators in the way the test expects. This can indicate a genuine bug,
  a test that is too rigid about implementation details, or test setup that
  does not match the current code paths.

fix:
  - "Read the mock failure message carefully — it reports the expected vs. actual call count and arguments."
  - "Check whether the code path that should trigger the mock is actually reached."
  - "If the behavior changed intentionally, update the mock expectations to match the new design."
  - "Use argument matchers (e.g., `gomock.Any()`, `Mockito.anyString()`) to loosen over-specified tests."
  - "Verify that test setup (e.g., `beforeEach`) correctly reinitializes mocks between tests."

prevent:
  - Prefer behavior-based assertions over strict call-count mocks for non-critical interactions.
  - Reset mocks explicitly between tests to avoid state leakage.
  - Review mock usage in tests that frequently fail due to implementation changes — they may be testing implementation, not behavior.

workflow:
  likely_files:
    - "**/*_test.go"
    - "**/*.test.ts"
    - "**/*.spec.ts"
