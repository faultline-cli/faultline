id: snapshot-mismatch
title: Snapshot or golden-file mismatch
category: test
severity: low
base_score: 0.8
tags: [test, snapshot, golden, fixtures]
stage_hints: [test]
match:
  any:
    - snapshot does not match
    - snapshot mismatch
    - stored snapshot
    - received value does not match stored snapshot
    - golden file mismatch
    - does not match the expected snapshot
    - update snapshots
summary: |-
  A snapshot or golden-file test saw output that no longer matches the committed expected result.
diagnosis_markdown: |-
  ## Diagnosis

  The test output changed relative to a stored snapshot or golden file.

  That change can be valid, but it can also reveal nondeterministic output such as timestamps, UUIDs, or unstable ordering.
fix_markdown: |-
  ## Fix steps

  1. Inspect the diff between the current output and the stored snapshot.
  2. If the new behavior is correct, regenerate and commit the updated snapshot.
  3. If the diff is unstable, normalize nondeterministic fields before snapshotting.
  4. Re-run the specific test more than once to confirm the output is stable.
validation_markdown: |-
  ## Validation

  ```bash
  go test ./...
  ```

  - Run the affected snapshot test repeatedly.
  - Confirm the regenerated fixture does not change between runs.
why_it_matters_markdown: |-
  ## Why it matters

  Snapshot tests are only valuable when their inputs are deterministic. If unstable output leaks in, the test becomes noisy and hides real regressions.
workflow:
  likely_files:
    - testdata/**
    - "**/*.snap"
    - "**/*.golden"
    - "**/*snapshot*"
  local_repro:
    - go test ./...
  verify:
    - go test ./...
