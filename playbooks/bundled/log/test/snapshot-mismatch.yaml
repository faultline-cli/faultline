id: snapshot-mismatch
title: Snapshot or golden-file mismatch
category: test
severity: low
base_score: 0.8
tags: [test, snapshot, golden, fixtures]
stage_hints: [test]

match:
  any:
    - snapshot does not match
    - snapshot mismatch
    - stored snapshot
    - received value does not match stored snapshot
    - golden file mismatch
    - does not match the expected snapshot
    - update snapshots

explain: >
  A test compared current output against a committed snapshot or golden file and
  found a difference.

why: >
  The behavior may have changed intentionally without regenerating the snapshot,
  or the output may now depend on unstable ordering, timestamps, or environment
  details.

fix:
  - Inspect the diff between the current output and the stored snapshot to decide whether the behavior change is expected.
  - If the new output is correct, regenerate and commit the updated snapshots or golden files.
  - If the diff is unstable, remove nondeterministic fields such as timestamps, UUIDs, or map iteration order before snapshotting.
  - Re-run the specific test locally to confirm the output is stable across repeated runs.

prevent:
  - Keep snapshot inputs deterministic and normalize unstable fields before writing expected output.
  - Review snapshot diffs carefully in pull requests instead of auto-accepting them.
  - Prefer narrow golden files that capture only the behavior that matters.

workflow:
  likely_files:
    - testdata/**
    - "**/*.snap"
    - "**/*.golden"
    - "**/*snapshot*"
  local_repro:
    - go test ./...
  verify:
    - go test ./...
