id: rspec-failure
title: Ruby RSpec test failure
category: test
severity: high
base_score: 1.0
tags: [ruby, rspec, test, assertion, spec]
stage_hints: [test]
summary: |-
  One or more RSpec examples failed. The `Failure/Error:` block identifies the
  exact expectation that was not met and the file and line number where it was
  declared.
diagnosis_markdown: |-
  ## Diagnosis

  RSpec ran the example group and at least one expectation (`expect(...).to ...`)
  did not hold. The failure output includes:
  - The example description path (e.g., `UserService#create returns a user`)
  - The `Failure/Error:` line showing the expectation that failed
  - The expected and received values
  - A backtrace pointing to the spec file and line

  Common causes:
  - A method return value changed without updating the spec's expected value.
  - A factory or fixture produces different data than the spec assumes.
  - Side effects from a previous example leaked into this one (missing
    database cleaner configuration or missing `let` memoisation reset).
  - An async operation (background job, database write) was not awaited before
    the expectation ran.
fix_markdown: |-
  ## Fix steps

  1. Run the failing example in isolation using the spec file path and line:

     ```bash
     bundle exec rspec spec/services/user_service_spec.rb:15 --format documentation
     ```

  2. Read the `Failure/Error:` block: compare `expected` and `got` (or
     `received` and `expected`) to understand what changed.

  3. If the production code changed: update it to restore the expected behaviour,
     or update the spec if the old expectation was wrong.

  4. If the spec is state-dependent: add `DatabaseCleaner` around the example,
     move shared state into a `let` or `before` block, or use `RSpec::Mocks`
     instead of real records.

  5. If a factory changed: re-run `bundle exec rspec` with `--format progress`
     to surface all failures and check whether multiple tests break together —
     that usually points to a factory or shared helper change.
validation_markdown: |-
  ## Validation

  - Run `bundle exec rspec` and confirm:
    ```
    N examples, 0 failures
    ```
  - Run the specific failing example in isolation to confirm it now passes.
why_it_matters_markdown: |-
  ## Why it matters

  RSpec failures are deterministic given the same input state. A failure in CI
  that does not reproduce locally usually means the CI database is in a
  different state, the test order is different, or a time-dependent assertion
  is sensitive to the CI runner clock.

  ## Prevention

  - Use `DatabaseCleaner` with `:transaction` strategy for unit specs and
    `:truncation` for feature specs.
  - Freeze time with `Timecop` or `ActiveSupport::Testing::TimeHelpers` when a
    spec depends on the current timestamp.
  - Run the suite with `--order random` in CI to surface hidden order
    dependencies early.
match:
  any:
    - "Failure/Error:"
    - "failed examples:"
    - "rspec --format"
    - "examples, 1 failure"
    - "examples, 2 failures"
    - "examples, 3 failures"
    - "failures, 0 pending"
    - "rspec spec"
  none:
    - "0 failures"
    - "no offenses detected"
    - "flaky test"
    - "intermittent failure"
    - "retry attempt"
workflow:
  likely_files:
    - spec/
    - "spec/**/*_spec.rb"
    - .rspec
    - Gemfile
  local_repro:
    - bundle exec rspec --format documentation
  verify:
    - bundle exec rspec
