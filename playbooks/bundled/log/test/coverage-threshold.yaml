id: coverage-threshold
title: Code coverage below required threshold
category: test
severity: medium
base_score: 0.9
tags: [coverage, test, threshold, quality-gate]
stage_hints: [test]

match:
  any:
    - "coverage threshold"
    - "Coverage below"
    - "below the minimum"
    - "minimum coverage"
    - "failed to meet"
    - "Jest: Global coverage threshold"
    - "Coverage threshold not met"
    - "coverage is below"
    - "FAIL coverage"
    - "does not meet minimum"
    - "istanbul"
    - "lcov"
    - "Insufficient coverage"

explain: >
  The test coverage report shows that line, branch, or function coverage is
  below the configured minimum threshold. The CI step is configured to fail
  when this threshold is not met.

why: >
  Coverage drops happen when new code is added without accompanying tests, when
  tests are deleted without removing the code they covered, or when a coverage
  configuration change raises the threshold above current coverage.

fix:
  - "Run coverage locally to see which files are under-covered: `npm test -- --coverage`."
  - Write tests for the uncovered lines identified in the coverage report.
  - "If the threshold was recently raised, confirm the change was intentional."
  - "As a short-term unblock, add `/* istanbul ignore next */` to auto-generated code."

prevent:
  - Review coverage trends in PRs using a coverage comment or badge.
  - Enforce a ratcheting threshold that never allows coverage to go below the current level.
  - Exclude generated files and vendor code from coverage measurement.

workflow:
  likely_files:
    - jest.config.js
    - jest.config.ts
    - .nycrc
    - pyproject.toml
    - .coveragerc
