id: health-check-failure
title: Service health check failure
category: deploy
severity: high
base_score: 1.0
tags: [health-check, kubernetes, docker, deployment]
stage_hints: [deploy]
match:
  any:
    - health check failed
    - liveness probe failed
    - readiness probe failed
    - unhealthy
    - service is not ready
    - waiting for deployment to be ready
  none:
    - ECS
    - CannotPullContainerError
    - deployment circuit breaker
    - service could not stabilize
    - Insufficient cpu
    - Insufficient memory
    - FailedScheduling
summary: |-
  The new service instance never became healthy enough for traffic.
diagnosis_markdown: |-
  ## Diagnosis

  The deploy reached the runtime environment, but the process did not satisfy the configured readiness or liveness checks before the timeout window closed.

  Common causes:

  - missing configuration or secrets
  - startup migrations failing
  - the app listening on the wrong port
  - a crash loop during bootstrap
fix_markdown: |-
  ## Fix steps

  1. Inspect startup logs for the failing container:

     ```bash
     kubectl logs <pod> --previous
     ```

  2. Verify the health check path and port match what the application actually serves.
  3. Confirm all required environment variables and secrets are present in the deployment.
  4. Check that dependent services such as databases and caches are reachable from the new pod.
validation_markdown: |-
  ## Validation

  - Hit the readiness endpoint directly from a pod or staging environment.
  - Confirm the deployment becomes ready without restarts.
  - Re-run the rollout and watch the probe status until it stabilizes.
why_it_matters_markdown: |-
  ## Why it matters

  Health checks are the deployment gate that protects traffic from a broken release. When they fail, the platform is telling you the new instance is not safely serving requests.
workflow:
  likely_files:
    - k8s/**/*.yaml
    - deploy/**/*.yaml
    - docker-compose*.yml
    - .github/workflows/*.yml
    - .github/workflows/*.yaml
  local_repro:
    - kubectl logs <pod> --previous
    - kubectl describe pod <pod>
  verify:
    - kubectl rollout status deploy/<name>
    - kubectl get events --sort-by=.lastTimestamp
