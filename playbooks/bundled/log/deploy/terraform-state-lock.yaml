id: terraform-state-lock
title: Terraform state lock conflict
category: deploy
severity: high
base_score: 1.0
tags: [terraform, state, lock, infra]
stage_hints: [deploy]
summary: |-
  Terraform could not acquire the state lock because another Terraform process is currently holding it. Only one Terraform operation can modify state at a time.
diagnosis_markdown: |-
  ## Diagnosis

  Terraform could not acquire the state lock because another Terraform process is currently holding it. Only one Terraform operation can modify state at a time.

  State locking prevents concurrent modifications to the same infrastructure. The lock is usually held by a parallel CI job, a manual run, or a crashed previous job that did not release the lock.
fix_markdown: |-
  ## Fix steps

  1. Identify which job or operator currently holds the lock before taking action; the backend usually records the lock ID and owner context.
  2. Wait for any active Terraform apply or plan touching the same state to complete, or cancel the duplicate run in CI.
  3. Use `terraform force-unlock <LOCK_ID>` only after confirming the lock is stale and no active Terraform process is still working against that state.
  4. Check your CI configuration for parallel jobs, retries, or manual approval paths that target the same Terraform backend or workspace.
  5. If the backend keeps stale locks after runner crashes, inspect backend-specific logs and cleanup behaviour before repeating the apply.
validation_markdown: |-
  ## Validation

  - Re-run the Terraform command after the active lock holder exits or the stale lock is cleared.
  - Confirm Terraform acquires the lock cleanly and proceeds without a state-lock error.
why_it_matters_markdown: |-
  ## Why it matters

  Terraform state locking protects shared infrastructure from concurrent writes. Bypassing the lock incorrectly can corrupt state or hide overlapping deploy activity.

  ## Prevention

  - Serialize Terraform runs per environment using CI concurrency groups, environment locks, or a single deployment lane.
  - Use separate state files or workspaces for environments that are expected to run in parallel.
  - Alert on locks that outlive the normal apply window so stale-state incidents are caught quickly.
  - Avoid overlapping manual Terraform operations with pipeline-managed infrastructure changes.

match:
  any:
    - error locking state
    - state lock
    - lock id
    - another terraform process
    - terraform state is locked
    - error acquiring the state lock
