id: terraform-state-lock
title: Terraform state lock conflict
category: deploy
severity: high
base_score: 1.0
tags: [terraform, state, lock, infra]
stage_hints: [deploy]

match:
  any:
    - error locking state
    - state lock
    - lock id
    - another terraform process
    - terraform state is locked
    - error acquiring the state lock

explain: >
  Terraform could not acquire the state lock because another Terraform process
  is currently holding it. Only one Terraform operation can modify state at
  a time.

why: >
  State locking prevents concurrent modifications to the same infrastructure.
  The lock is usually held by a parallel CI job, a manual run, or a crashed
  previous job that did not release the lock.

fix:
  - Identify which job or operator currently holds the lock before taking action; the backend usually records the lock ID and owner context.
  - Wait for any active Terraform apply or plan touching the same state to complete, or cancel the duplicate run in CI.
  - "Use `terraform force-unlock <LOCK_ID>` only after confirming the lock is stale and no active Terraform process is still working against that state."
  - Check your CI configuration for parallel jobs, retries, or manual approval paths that target the same Terraform backend or workspace.
  - If the backend keeps stale locks after runner crashes, inspect backend-specific logs and cleanup behaviour before repeating the apply.

prevent:
  - Serialize Terraform runs per environment using CI concurrency groups, environment locks, or a single deployment lane.
  - Use separate state files or workspaces for environments that are expected to run in parallel.
  - Alert on locks that outlive the normal apply window so stale-state incidents are caught quickly.
  - Avoid overlapping manual Terraform operations with pipeline-managed infrastructure changes.
