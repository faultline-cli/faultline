id: config-mismatch
title: Deployment configuration mismatch
category: deploy
severity: medium
base_score: 0.8
tags: [config, env, secret, missing-variable, deployment]
stage_hints: [deploy]

match:
  any:
    - environment variable not set
    - "required env"
    - missing configuration
    - config not found
    - "no such secret"
    - "secret not found"
    - "configmap not found"
    - invalid configuration
    - "cannot find key"
  none:
    - "KeyError:"
    - os.environ
    - process.env.
    - getenv

explain: >
  The deployment failed because a required configuration value, environment
  variable, or secret was absent or had an unexpected value for the target
  environment.

why: >
  Configuration mismatches occur when a new deployment requires values that
  were never provisioned in the target environment, or when a key was renamed
  in code but not updated in the secret store or ConfigMap.

fix:
  - Compare the expected configuration keys in the application against what is present in the target environment.
  - "For Kubernetes: `kubectl get secret <name> -o yaml` and `kubectl get configmap <name> -o yaml`."
  - Add or update the missing keys, then re-trigger the deployment.
  - If a value was renamed, update both the secret store and the deployment spec atomically.

prevent:
  - "Enumerate all required configuration keys in a well-known location (e.g., `.env.example`)."
  - Add a configuration validation step at container startup that fails fast with a clear error listing every missing key.
  - Use a deployment checklist or IaC tooling (Helm, Terraform) that manages secrets and ConfigMaps alongside the deployment.
