id: terraform-init
title: Terraform initialization failure
category: deploy
severity: high
base_score: 1.0
tags: [terraform, iac, init, provider, backend]
stage_hints: [deploy]
summary: |-
  `terraform init` failed before any plan or apply could begin. Initialization downloads providers and configures the backend; errors here prevent any subsequent Terraform operation in the pipeline.
diagnosis_markdown: |-
  ## Diagnosis

  `terraform init` failed before any plan or apply could begin. Initialization downloads providers and configures the backend; errors here prevent any subsequent Terraform operation in the pipeline.
fix_markdown: |-
  ## Fix steps

  1. Check the provider version constraints in `required_providers` against what is available at registry.terraform.io.
  2. For backend failures: verify that the state bucket/container exists and the CI service account has read/write permission on it.
  3. Run `terraform init -upgrade` locally to refresh the provider lock file.
  4. Check that the Terraform version in CI satisfies the `required_version` constraint in `terraform.tf`.
validation_markdown: |-
  ## Validation

  - terraform version
why_it_matters_markdown: |-
  ## Why it matters

  Init failures occur when a required provider version cannot be found in the registry, the backend bucket or container is missing or inaccessible, provider constraints in `required_providers` conflict, or the Terraform version in CI does not satisfy `required_version`.

  ## Prevention

  - Commit `.terraform.lock.hcl` to source control so provider versions are pinned and consistent across environments.
  - Use a remote backend from the start; do not rely on local state in shared pipelines.
  - Test `terraform init` in a dedicated validation step before plan or apply.
match:
  any:
    - "Error: Failed to install provider"
    - "Error: Unsatisfied provider requirements"
    - "Error: Could not load plugin"
    - "Could not retrieve the list of available versions"
    - "Error: Backend configuration changed"
    - "Error: No configuration files"
    - "Failed to query available provider packages"
    - "Could not resolve provider"
    - "terraform init"
    - "Error initializing the backend"
    - "Error: Required plugins are not installed"
  none:
    - "terraform apply"
    - "Error acquiring the state lock"
    - "terraform plan"
workflow:
  likely_files:
    - "*.tf"
    - .terraform.lock.hcl
    - "terraform/**"
  local_repro:
    - terraform init
  verify:
    - terraform version
