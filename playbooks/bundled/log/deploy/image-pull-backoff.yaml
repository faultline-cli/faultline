id: image-pull-backoff
title: Container image pull failure
category: deploy
severity: high
base_score: 1.0
tags: [kubernetes, docker, image, registry, deploy]
stage_hints: [deploy]

match:
  any:
    - imagepullbackoff
    - errimagepull
    - failed to pull image
    - manifest unknown
    - pull access denied for
    - back-off pulling image
    - "rpc error: code = unknown desc = error response from daemon"

explain: >
  The deployment failed because the runtime could not pull the requested
  container image from the registry.

why: >
  The tag may not exist, the registry may require authentication, or the image
  reference in the deployment spec may point at the wrong repository.

fix:
  - Verify the image name and tag in the deployment manifest exactly match a published image.
  - Confirm the cluster or runner has registry credentials for the target repository.
  - Inspect the imagePullSecrets or runtime credential configuration used by the deployment.
  - Check the latest successful build or release job to confirm the image was pushed before deploy started.

prevent:
  - Promote immutable image digests rather than mutable tags between build and deploy stages.
  - Add a release gate that verifies the target image exists before rollout.
  - Keep registry authentication and image naming conventions standardized across environments.

workflow:
  likely_files:
    - Dockerfile
    - docker-compose*.yml
    - .github/workflows/*.yml
    - .github/workflows/*.yaml
    - k8s/**/*.yaml
    - deploy/**/*.yaml
  local_repro:
    - docker pull <image>:<tag>
  verify:
    - kubectl describe pod <pod>
    - kubectl get events --sort-by=.lastTimestamp
