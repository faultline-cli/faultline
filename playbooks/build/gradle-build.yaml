id: gradle-build
title: Gradle build failure
category: build
severity: high
base_score: 1.0
tags: [gradle, java, kotlin, android, build]
stage_hints: [build]

match:
  any:
    - "BUILD FAILED"
    - "FAILURE: Build failed with an exception"
    - "What went wrong:"
    - "Could not resolve"
    - "Could not download"
    - "Execution failed for task"
    - "Gradle build daemon"
    - "Could not GET"
    - "Connection refused"
    - "Could not find"
    - "compileSdkVersion"
    - "Gradle version"
  none:
    - "BUILD SUCCESS"

explain: >
  Gradle exited with a non-zero status, indicating one or more tasks failed.
  The `FAILURE:` block in the output identifies the first task that failed
  and the root cause.

why: >
  Gradle failures can stem from: dependency resolution errors (private repository
  authentication, unavailable version), task compilation errors, Android SDK
  not installed, or an incompatible Gradle wrapper version.

fix:
  - "Read the `What went wrong:` block — it contains the direct cause and file location."
  - "For `Could not resolve`: check the repository URL and any private repo credentials."
  - "For `Execution failed for task ':compileJava'`: fix the Java compilation errors listed below."
  - "Run `./gradlew <task> --stacktrace` locally for the full exception chain."
  - "For daemon issues: run `./gradlew --no-daemon` to rule out cached state."

prevent:
  - Cache `~/.gradle/caches` between CI runs to avoid repeated dependency downloads.
  - Pin the Gradle wrapper version in `gradle/wrapper/gradle-wrapper.properties`.
  - Enable `--build-cache` in CI to reuse task outputs across runs.

workflow:
  likely_files:
    - build.gradle
    - build.gradle.kts
    - settings.gradle
    - gradlew
  local_repro:
    - ./gradlew build --stacktrace
