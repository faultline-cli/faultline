id: pip-install-failure
title: pip package install failure
category: build
severity: high
base_score: 1.0
tags: [python, pip, install, dependencies, build]
stage_hints: [build]

match:
  any:
    - "ERROR: Could not find a version that satisfies the requirement"
    - "No matching distribution found for"
    - "pip install"
    - "pip._internal"
    - "ResolutionImpossible"
    - "Could not build wheels for"
    - "error: command 'gcc' failed"
    - "ERROR: pip's dependency resolver"
    - "Requirements were not successfully fulfilled"
    - "Preparing metadata (setup.py) did not run successfully"
    - "Could not fetch URL"
    - "Connection error"
    - "ERROR: Failed building wheel"

explain: >
  `pip install` could not satisfy one or more package requirements. The package
  may not exist on PyPI, the version constraint is too restrictive, or a
  C extension failed to compile.

why: >
  Common causes: conflicting version constraints across packages, a package
  that requires a native library or compiler toolchain that is not installed,
  a private PyPI index that is unreachable, or Python version incompatibility.

fix:
  - "Run `pip install -r requirements.txt -v` locally for full resolver output."
  - "For `ResolutionImpossible`: relax or align version constraints in `requirements.txt`."
  - "For `Failed building wheel`: install the required system libraries (e.g. `libpq-dev`, `build-essential`)."
  - "For private indexes: set `PIP_EXTRA_INDEX_URL` or add `--extra-index-url` to the install command."
  - "Use `pip-compile` from pip-tools to generate a locked `requirements.txt`."

prevent:
  - Use `pip-compile` or `poetry lock` to pin all transitive dependencies.
  - Cache the pip download cache between CI runs.
  - Specify a minimum Python version in `pyproject.toml` to prevent incompatible installs.

workflow:
  likely_files:
    - requirements.txt
    - requirements-dev.txt
    - setup.cfg
    - pyproject.toml
    - Pipfile
  local_repro:
    - pip install -r requirements.txt
