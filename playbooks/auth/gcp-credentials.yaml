id: gcp-credentials
title: GCP credentials missing or invalid
category: auth
severity: high
base_score: 1.0
tags: [gcp, google-cloud, credentials, iam, auth]
stage_hints: [build, deploy]

match:
  any:
    - "GOOGLE_APPLICATION_CREDENTIALS"
    - "google: could not find default credentials"
    - "Application Default Credentials are not available"
    - "Unable to retrieve google credentials"
    - "Error 403: Required 'compute.instances.list' permission"
    - "Request had insufficient authentication scopes"
    - "PermissionDenied"
    - "invalid_grant: Token has been expired"
    - "The caller does not have permission"
    - "status = StatusCode.UNAUTHENTICATED"

explain: >
  The job could not authenticate with Google Cloud Platform. The Application
  Default Credentials (ADC) chain found no valid credentials, or the service
  account does not have the required IAM permission.

why: >
  In CI, GCP authentication typically flows through a service account key stored
  as a base64-encoded JSON secret, or through Workload Identity Federation (OIDC).
  A missing `GOOGLE_APPLICATION_CREDENTIALS` file, an expired key, or an
  insufficient IAM role causes this error.

fix:
  - "Ensure `GOOGLE_APPLICATION_CREDENTIALS` points to a valid service account JSON key file."
  - "Decode the base64 secret to a temp file: `echo \"$SA_KEY\" | base64 -d > /tmp/sa.json`."
  - "For `PermissionDenied`, grant the required IAM role to the service account."
  - "Prefer Workload Identity Federation over long-lived service account keys."
  - "Run `gcloud auth application-default login` locally to validate credentials."

prevent:
  - Use Workload Identity Federation with OIDC to eliminate long-lived key material.
  - Set service account key expiry and update CI secrets before they expire.
  - Scope service accounts to the minimum required GCP permissions.

workflow:
  likely_files:
    - .github/workflows/*.yml
    - .gitlab-ci.yml
    - cloudbuild.yaml
  local_repro:
    - gcloud auth application-default print-access-token
  verify:
    - gcloud auth application-default print-access-token
