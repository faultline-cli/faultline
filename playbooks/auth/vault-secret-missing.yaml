id: vault-secret-missing
title: HashiCorp Vault secret not found or access denied
category: auth
severity: high
base_score: 1.0
tags: [vault, hashicorp, secrets, token, policy, kv]
stage_hints: [build, deploy]

match:
  any:
    - "secret does not exist"
    - "permission denied.*vault"
    - "vault.*permission denied"
    - "Error making API request"
    - "vault token expired"
    - "403 Forbidden.*vault"
    - "Code: 403.*vault"
    - "path not found"
    - "Vault.*error"
    - "no secret"
    - "vault agent"
    - "VAULT_ADDR"
    - "VAULT_TOKEN"
    - "Secret retrieval failed"

explain: >
  The CI job failed to read a secret from HashiCorp Vault. Either the secret
  path does not exist, the Vault token lacks the required policy, or the token
  has expired.

why: >
  Vault secret failures occur when: the secret was moved to a new path without
  updating the policy or job configuration, the Vault token used by CI has
  expired (short-lived tokens are common), the policy attached to the AppRole
  or token does not include a `read` capability on the secret path, or the
  Vault cluster is unreachable from the CI runner.

fix:
  - "Verify the secret path exists: `vault kv get <path>`."
  - "Check the token's policies: `vault token lookup` and `vault policy read <policy-name>`."
  - "Renew or regenerate the Vault token or AppRole secret-id if it has expired."
  - "Test connectivity: `curl -s $VAULT_ADDR/v1/sys/health`."
  - "Review the Vault audit log for the exact denied request if VAULT_TOKEN is valid but access is denied."

prevent:
  - Use short-lived tokens with AppRole `secret_id_ttl` set, not long-lived static tokens.
  - Use Vault's dynamic secrets where possible to reduce stale credential issues.
  - Alert when Vault tokens approach their TTL so they are rotated before expiry.

workflow:
  likely_files:
    - .github/workflows/
    - vault/
