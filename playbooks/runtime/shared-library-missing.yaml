id: shared-library-missing
title: Shared library not found at runtime
category: runtime
severity: high
base_score: 1.0
tags: [shared-library, linker, so, dll, runtime, linux]
stage_hints: [build, test, deploy]

match:
  any:
    - "error while loading shared libraries"
    - "cannot open shared object file"
    - "No such file or directory"
    - ".so: cannot open"
    - ".dylib: image not found"
    - "symbol lookup error"
    - "undefined symbol"
    - "libstdc++.*not found"
    - "libc.so.*not found"
    - "Library not loaded"
    - "image not found"
    - "cannot find -l"
    - "ld: library not found"

explain: >
  A dynamically linked shared library (`.so` on Linux, `.dylib` on macOS) that
  the executable depends on is not present or not on the library search path
  at runtime.

why: >
  Shared library errors happen when: a system package is installed in the build
  environment but not in the runtime container or CI runner, the library is
  present but in a non-standard path not in `LD_LIBRARY_PATH`, a newer version
  of a library is installed than the one the binary was compiled against, or an
  Alpine-based container runs a binary compiled for glibc.

fix:
  - "Identify the missing library from the error and the binary that needs it: `ldd <binary>` (Linux) or `otool -L <binary>` (macOS)."
  - "Install the system package that provides the missing library: `apt-get install -y <package>` or `apk add <package>` for Alpine."
  - "Add the library directory to the search path: `export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH`."
  - "For Alpine Linux: binaries compiled against glibc will not run — add `libc6-compat` or switch to a glibc-based image."
  - "Use musl or static linking for maximum portability: `CGO_ENABLED=0 go build` for Go, `--static` for GCC."
  - "Run `ldconfig -p | grep <libname>` to confirm the installed library is visible to the linker."

prevent:
  - Build and run in the same base image (or a minimal derivative of it) to guarantee library availability.
  - Use statically linked binaries when portability across distributions is a requirement.
  - "Add `ldd <binary>` to the post-build validation step and fail CI if any dependencies are unresolved (`ldd ... | grep 'not found'`)."
  - Document all required system libraries in the project README and Dockerfile.

workflow:
  likely_files:
    - Dockerfile
  local_repro:
    - ldd <binary>
    - "ldconfig -p | grep <libname>"
