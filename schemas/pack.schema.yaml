type: object
required:
  - name
  - version
properties:
  name:
    type: string
    description: Stable pack identifier.
  version:
    type: string
    description: Human-readable pack version.
  description:
    type: string
  detectors:
    type: array
    items:
      type: string
      enum:
        - log
        - source
  includes:
    type: array
    items:
      type: string
